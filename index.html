<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta property="og:title" content="리니지 클래식 툴즈" />
    <meta property="og:description" content="리니지 클래식 유틸리티 통합 모음" />
    <title>리니지 클래식 통합 툴즈</title>
    <script>
      (function () {
        try {
          if (localStorage.getItem("lineageGlobalTheme") === "light") {
            document.documentElement.classList.remove("dark");
          } else {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
  </head>
  <body class="h-[100dvh] flex flex-col bg-zinc-50 dark:bg-zinc-950 transition-colors duration-300 overflow-hidden">
    <header class="bg-white dark:bg-zinc-900 border-b border-zinc-200 dark:border-zinc-800 px-4 py-3 flex flex-wrap items-center justify-between shadow-sm shrink-0 transition-colors duration-300 z-50 gap-3">
      <h1 class="text-base sm:text-xl font-extrabold tracking-tight text-zinc-900 dark:text-zinc-100 flex items-center gap-2 shrink-0">리니지 툴즈</h1>

      <div class="flex items-center gap-3 sm:gap-4 ml-auto">
        <button onclick="toggleGlobalTheme()" class="p-2 rounded-lg bg-zinc-100 dark:bg-zinc-800 text-zinc-600 dark:text-zinc-400 hover:text-amber-500 dark:hover:text-amber-400 transition-colors shrink-0">
          <span id="theme-icon-container">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-indigo-500"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" /></svg>
          </span>
        </button>

        <div class="flex bg-zinc-100 dark:bg-zinc-950 p-1 rounded-lg border border-zinc-200 dark:border-zinc-800 shadow-inner gap-0.5 overflow-x-auto no-scrollbar">
          <button onclick="switchTab('stat')" id="tab-btn-stat" class="px-2.5 py-1.5 text-[11px] sm:text-sm font-bold rounded transition-all whitespace-nowrap text-zinc-500 dark:text-zinc-400 hover:text-zinc-800 dark:hover:text-zinc-200">축/저주</button>
          <button onclick="switchTab('info')" id="tab-btn-info" class="px-2.5 py-1.5 text-[11px] sm:text-sm font-bold rounded transition-all whitespace-nowrap text-zinc-500 dark:text-zinc-400 hover:text-zinc-800 dark:hover:text-zinc-200">아이템</button>
          <button onclick="switchTab('craft')" id="tab-btn-craft" class="px-2.5 py-1.5 text-[11px] sm:text-sm font-bold rounded transition-all whitespace-nowrap text-zinc-500 dark:text-zinc-400 hover:text-zinc-800 dark:hover:text-zinc-200">제작</button>
          <button onclick="switchTab('mark')" id="tab-btn-mark" class="px-2.5 py-1.5 text-[11px] sm:text-sm font-bold rounded transition-all whitespace-nowrap text-zinc-500 dark:text-zinc-400 hover:text-zinc-800 dark:hover:text-zinc-200">혈마크</button>
        </div>
      </div>
    </header>

    <div class="relative flex-1 w-full overflow-hidden bg-zinc-50 dark:bg-zinc-950">
      <iframe id="frame-stat" src="html/stat.html" class="absolute inset-0 w-full h-full border-none transition-opacity duration-300"></iframe>
      <iframe id="frame-info" src="html/item_info.html" class="absolute inset-0 w-full h-full border-none opacity-0 pointer-events-none transition-opacity duration-300"></iframe>
      <iframe id="frame-craft" src="html/craft.html" class="absolute inset-0 w-full h-full border-none opacity-0 pointer-events-none transition-opacity duration-300"></iframe>
      <iframe id="frame-mark" src="html/mark.html" class="absolute inset-0 w-full h-full border-none opacity-0 pointer-events-none transition-opacity duration-300"></iframe>
    </div>

    <script>
      let isGlobalDark = true;

      function toggleGlobalTheme() {
        isGlobalDark = !isGlobalDark;
        applyTheme();
        broadcastTheme();
        localStorage.setItem("lineageGlobalTheme", isGlobalDark ? "dark" : "light");
      }

      function applyTheme() {
        const html = document.documentElement;
        const iconContainer = document.getElementById("theme-icon-container");

        const sunSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-amber-500"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>`;
        const moonSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-indigo-500"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>`;

        if (isGlobalDark) {
          html.classList.add("dark");
          iconContainer.innerHTML = sunSvg;
        } else {
          html.classList.remove("dark");
          iconContainer.innerHTML = moonSvg;
        }
      }

      function broadcastTheme() {
        const frames = ["frame-info", "frame-stat", "frame-mark", "frame-craft"];
        frames.forEach((id) => {
          const iframe = document.getElementById(id);
          if (iframe && iframe.contentWindow) {
            iframe.contentWindow.postMessage({ type: "THEME_CHANGE", isDark: isGlobalDark }, "*");
          }
        });
      }

      function switchTab(tabId) {
        const tabs = ["info", "stat", "mark", "craft"];

        tabs.forEach((id) => {
          const frame = document.getElementById(`frame-${id}`);
          const btn = document.getElementById(`tab-btn-${id}`);

          if (id === tabId) {
            frame.classList.remove("opacity-0", "pointer-events-none");
            frame.classList.add("opacity-100");
            btn.classList.add("bg-white", "dark:bg-zinc-800", "text-indigo-600", "dark:text-indigo-400", "shadow");
            btn.classList.remove("text-zinc-500", "dark:text-zinc-400", "hover:text-zinc-800", "dark:hover:text-zinc-200");
          } else {
            frame.classList.add("opacity-0", "pointer-events-none");
            frame.classList.remove("opacity-100");
            btn.classList.remove("bg-white", "dark:bg-zinc-800", "text-indigo-600", "dark:text-indigo-400", "shadow");
            btn.classList.add("text-zinc-500", "dark:text-zinc-400", "hover:text-zinc-800", "dark:hover:text-zinc-200");
          }
        });

        localStorage.setItem("lineageLastTab", tabId);
        setTimeout(broadcastTheme, 150);
      }

      window.addEventListener("DOMContentLoaded", () => {
        const savedTheme = localStorage.getItem("lineageGlobalTheme");
        if (savedTheme) {
          isGlobalDark = savedTheme === "dark";
        }
        applyTheme();

        const savedTab = localStorage.getItem("lineageLastTab") || "stat";
        switchTab(savedTab);

        setTimeout(broadcastTheme, 800);
      });

      window.addEventListener("message", (e) => {
        if (e.data.type === "REQUEST_THEME") {
          broadcastTheme();
        }
      });
    </script>
  </body>
</html>
