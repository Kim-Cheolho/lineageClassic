<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L-Monster Info</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>

    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: { sans: ["Inter", "sans-serif"] },
            animation: {
              "fade-in": "fadeIn 0.2s ease-out forwards",
              "slide-up": "slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards",
            },
            keyframes: {
              fadeIn: { "0%": { opacity: "0" }, "100%": { opacity: "1" } },
              slideUp: { "0%": { opacity: "0", transform: "translateY(20px) scale(0.98)" }, "100%": { opacity: "1", transform: "translateY(0) scale(1)" } },
            },
          },
        },
      };
      (function () {
        try {
          if (localStorage.getItem("lineageGlobalTheme") === "light") {
            document.documentElement.classList.remove("dark");
          } else {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>

    <script src="../js/data.js"></script>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap");

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background-color: #cbd5e1;
        border-radius: 20px;
      }
      .dark ::-webkit-scrollbar-thumb {
        background-color: #3f3f46;
      }
      .custom-checkbox:checked + div {
        background-color: #ef4444; /* 몬스터는 붉은색 테마 포인트 */
        border-color: #ef4444;
      }
      .custom-checkbox:checked + div svg {
        display: block;
      }
      .card-hover-fx {
        transition: all 0.2s ease-in-out;
      }
      .card-hover-fx:hover {
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 font-sans min-h-screen transition-colors duration-300 flex flex-col overflow-x-hidden" id="body-root">
    <div id="loading-overlay" class="fixed inset-0 z-[200] bg-zinc-50 dark:bg-zinc-950 flex flex-col items-center justify-center transition-opacity duration-500">
      <div class="relative w-16 h-16 flex items-center justify-center mb-5">
        <div class="absolute inset-0 border-4 border-red-200 dark:border-red-900/50 rounded-full"></div>
        <div class="absolute inset-0 border-4 border-red-500 rounded-full border-t-transparent animate-spin"></div>
        <i data-lucide="ghost" class="w-6 h-6 text-red-500 animate-pulse"></i>
      </div>
      <span class="text-sm font-bold text-zinc-600 dark:text-zinc-400 animate-pulse">몬스터 데이터 동기화 중...</span>
    </div>

    <!-- 헤더 -->
    <header id="main-header" class="sticky top-0 z-40 bg-white dark:bg-zinc-950 border-b border-zinc-200 dark:border-zinc-800 shadow-sm transition-colors duration-300">
      <div class="max-w-[1400px] mx-auto w-full">
        <div class="px-4 py-3 flex items-center gap-3">
          <div class="flex-1 flex items-center px-4 py-2 bg-zinc-50 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-700 rounded-2xl shadow-inner focus-within:border-red-500 focus-within:ring-1 focus-within:ring-red-500/30 transition-all">
            <i data-lucide="search" class="w-5 h-5 text-zinc-500 dark:text-zinc-500 mr-2 shrink-0"></i>
            <input type="text" id="search-input" placeholder="몬스터명, 드롭 아이템 검색" class="bg-transparent border-none outline-none w-full text-sm font-medium text-zinc-900 dark:text-zinc-100 placeholder-zinc-500 dark:placeholder-zinc-500" autocomplete="off" />
          </div>

          <div class="flex items-center gap-2 shrink-0">
            <div class="flex items-center gap-1.5 px-3 py-2 bg-red-50 dark:bg-red-500/10 border border-red-100 dark:border-red-500/20 rounded-xl">
              <i data-lucide="ghost" class="w-4 h-4 text-red-600 dark:text-red-400"></i>
              <span class="text-xs font-bold text-zinc-700 dark:text-zinc-300">검색결과 <strong id="result-count" class="text-red-600 dark:text-red-400 text-sm ml-0.5">0</strong>건</span>
            </div>

            <label class="flex items-center cursor-pointer group" title="즐겨찾기 보기">
              <input type="checkbox" id="toggle-favorites" class="hidden" onchange="toggleFavoritesOnly(this)" />
              <div class="w-9 h-9 rounded-xl bg-zinc-50 dark:bg-zinc-800 flex items-center justify-center border border-zinc-200 dark:border-zinc-700 group-hover:border-amber-500 transition-colors cursor-pointer">
                <i data-lucide="star" id="icon-star-filter" class="w-4 h-4 text-zinc-500 group-hover:text-amber-500 transition-colors"></i>
              </div>
            </label>
          </div>
        </div>
      </div>
    </header>

    <!-- 레이아웃 컨테이너 -->
    <div class="w-full flex-1 px-4 py-4 md:px-6 lg:py-6">
      <div class="max-w-[1400px] mx-auto w-full h-full flex flex-col lg:flex-row gap-5 md:gap-6 items-start">
        <!-- 사이드바 필터 -->
        <aside id="sticky-sidebar" class="w-full lg:w-[280px] shrink-0 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 shadow-xl shadow-zinc-200/50 dark:shadow-none rounded-3xl p-4 sm:p-6 lg:sticky transition-colors duration-300 flex flex-col gap-6 z-10" style="top: 84px">
          <div class="flex items-center justify-between">
            <h2 class="text-xs font-bold text-zinc-700 dark:text-zinc-300 tracking-wider uppercase flex items-center"><i data-lucide="filter" class="w-4 h-4 mr-1.5 text-red-500"></i> 몬스터 검색</h2>
            <button onclick="resetFilters()" class="text-[11px] font-bold text-zinc-600 hover:text-red-600 dark:text-zinc-400 dark:hover:text-red-400 flex items-center gap-1 transition-colors bg-zinc-100 dark:bg-zinc-800 px-2 py-1 rounded-lg">
              <i data-lucide="rotate-ccw" class="w-3 h-3"></i> 초기화
            </button>
          </div>

          <div>
            <label class="block text-[11px] font-bold text-zinc-700 dark:text-zinc-300 uppercase tracking-wider mb-3">취약 속성</label>
            <div class="grid grid-cols-2 gap-y-3 gap-x-2" id="filter-weakness"></div>
          </div>

          <div class="h-px w-full bg-zinc-100 dark:bg-zinc-800/80"></div>

          <div>
            <label class="block text-[11px] font-bold text-zinc-700 dark:text-zinc-300 uppercase tracking-wider mb-3">크기</label>
            <div class="grid grid-cols-2 gap-y-3 gap-x-2" id="filter-size"></div>
          </div>
        </aside>

        <!-- 메인 목록 -->
        <main class="relative flex-1 w-full bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 shadow-xl shadow-zinc-200/50 dark:shadow-none rounded-3xl p-4 sm:p-6 transition-colors duration-300 min-h-[600px] flex flex-col z-0">
          <div id="item-list" class="grid grid-cols-1 xl:grid-cols-2 gap-4 items-stretch"></div>

          <div id="empty-state" class="hidden flex-col items-center justify-center flex-1 min-h-[300px] text-center">
            <div class="w-16 h-16 bg-zinc-100 dark:bg-zinc-800 rounded-2xl flex items-center justify-center mb-4 border border-zinc-200 dark:border-zinc-700">
              <i data-lucide="ghost" class="w-8 h-8 text-zinc-500 dark:text-zinc-500"></i>
            </div>
            <h3 class="text-lg font-bold text-zinc-900 dark:text-zinc-100 mb-1">몬스터 정보가 없습니다</h3>
            <p class="text-sm text-zinc-600 dark:text-zinc-400">다른 검색어나 필터 조건을 선택해보세요.</p>
          </div>
        </main>
      </div>
    </div>

    <!-- 모달 -->
    <div id="item-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 sm:p-6" onclick="closeModal(event)">
      <div class="absolute inset-0 bg-black/60 backdrop-blur-sm animate-fade-in"></div>

      <div class="relative w-full max-w-2xl max-h-[90vh] bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-3xl shadow-2xl flex flex-col animate-slide-up overflow-hidden" onclick="event.stopPropagation()">
        <div class="flex items-center justify-between px-6 py-4 border-b border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 shrink-0 z-10">
          <div class="flex items-center gap-3">
            <span id="modal-category-badge" class="px-2.5 py-1 text-[11px] font-bold rounded-lg bg-red-50 dark:bg-red-500/10 text-red-600 dark:text-red-400 border border-red-200 dark:border-red-500/20">분류</span>
            <h2 id="modal-title" class="text-xl font-extrabold text-zinc-900 dark:text-white">몬스터 이름</h2>
          </div>
          <button onclick="closeModal()" class="w-8 h-8 flex items-center justify-center rounded-full bg-zinc-100 dark:bg-zinc-800 text-zinc-500 hover:text-zinc-900 dark:hover:text-white transition-colors">
            <i data-lucide="x" class="w-5 h-5"></i>
          </button>
        </div>

        <div class="flex-1 overflow-y-auto p-6 flex flex-col gap-6 custom-scrollbar">
          <div class="flex flex-col sm:flex-row gap-6">
            <div class="shrink-0 mx-auto sm:mx-0 flex flex-col gap-3">
              <div id="modal-icon" class="w-28 h-28 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 shadow-sm rounded-2xl flex items-center justify-center overflow-hidden"></div>

              <!-- 주요 속성 요약 -->
              <div id="modal-trade-info" class="flex flex-col gap-1.5 w-full text-center"></div>
            </div>

            <div class="flex-1 flex flex-col gap-4">
              <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl p-4 shadow-sm">
                <h3 class="text-xs font-bold text-zinc-700 dark:text-zinc-300 mb-3 flex items-center gap-1.5"><i data-lucide="activity" class="w-4 h-4 text-red-500"></i> 전투 스탯</h3>
                <div id="modal-stats-grid" class="grid grid-cols-2 lg:grid-cols-3 gap-y-4 gap-x-2 text-sm"></div>
              </div>

              <!-- 설명이 있을 경우 표시 -->
              <div id="modal-desc-container" class="hidden flex-col gap-2">
                <div id="modal-desc-content" class="bg-zinc-50 dark:bg-zinc-950/50 border border-zinc-200 dark:border-zinc-800 p-4 rounded-xl text-sm text-zinc-600 dark:text-zinc-400 leading-relaxed"></div>
              </div>
            </div>
          </div>

          <div class="flex flex-col gap-4 border-t border-zinc-200 dark:border-zinc-800 pt-4">
            <div id="modal-set-container" class="flex flex-col gap-3">
              <h3 class="text-xs font-bold text-zinc-700 dark:text-zinc-300 flex items-center gap-1.5 ml-1"><i data-lucide="gift" class="w-4 h-4 text-amber-500"></i> 주요 드롭 아이템</h3>
              <div class="bg-amber-50 dark:bg-amber-950/20 border border-amber-200 dark:border-amber-900/50 p-4 rounded-2xl shadow-sm">
                <div id="modal-drop-items" class="flex flex-wrap gap-2"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="mini-item-modal" class="fixed inset-0 z-[110] hidden flex items-center justify-center p-4 sm:p-6" onclick="closeMiniItemModal(event)">
      <div class="absolute inset-0 bg-black/60 backdrop-blur-sm animate-fade-in"></div>
      <div class="relative w-full max-w-sm bg-zinc-50 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl shadow-2xl flex flex-col animate-slide-up overflow-hidden" onclick="event.stopPropagation()">
        <div class="flex items-center justify-between px-4 py-3 border-b border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-950 shrink-0">
          <div class="flex items-center gap-2">
            <span id="mini-item-category" class="px-2 py-0.5 text-[10px] font-bold rounded bg-indigo-50 dark:bg-indigo-500/10 text-indigo-600 dark:text-indigo-400 border border-indigo-200 dark:border-indigo-500/20">분류</span>
            <h2 id="mini-item-title" class="text-base font-extrabold text-zinc-900 dark:text-white">아이템 이름</h2>
          </div>
          <button onclick="closeMiniItemModal()" class="w-7 h-7 flex items-center justify-center rounded-full bg-zinc-100 dark:bg-zinc-800 text-zinc-500 hover:text-zinc-900 dark:hover:text-white transition-colors">
            <i data-lucide="x" class="w-4 h-4"></i>
          </button>
        </div>
        <div class="p-4 flex flex-col gap-4">
          <div class="flex gap-4">
            <div id="mini-item-icon" class="w-16 h-16 bg-white dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 shadow-sm rounded-xl flex items-center justify-center overflow-hidden shrink-0"></div>
            <div class="flex-1 flex flex-col gap-1 text-sm text-zinc-600 dark:text-zinc-400" id="mini-item-desc"></div>
          </div>
          <div id="mini-item-stats" class="grid grid-cols-2 gap-2 text-xs"></div>
        </div>
      </div>
    </div>

    <script>
      function syncHeaderHeight() {
        const header = document.getElementById("main-header");
        const sidebar = document.getElementById("sticky-sidebar");

        if (header) {
          const h = header.offsetHeight;
          if (sidebar) {
            sidebar.style.top = h + 24 + "px";
          }
        }
      }
      window.addEventListener("resize", syncHeaderHeight);
      window.addEventListener("load", syncHeaderHeight);

      window.addEventListener("message", (event) => {
        if (event.data.type === "THEME_CHANGE") {
          const html = document.documentElement;
          const body = document.getElementById("body-root");
          if (event.data.isDark) {
            html.classList.add("dark");
            body.classList.add("dark");
          } else {
            html.classList.remove("dark");
            body.classList.remove("dark");
          }
        }

        if (event.data.type === "DATA_BACKGROUND_UPDATED") {
          const parentWin = window.parent || window;
          if (parentWin.__SHARED_MONSTERS_DB__) {
            monsters_db = parentWin.__SHARED_MONSTERS_DB__;

            // 몬스터 DB가 업데이트되면 목록 갱신
            renderList();
          }
        }
      });

      let state = {
        searchTerm: "",
        weaknesses: [],
        sizes: [],
        favoritesOnly: false,
        favorites: JSON.parse(localStorage.getItem("lcraft_mob_favorites") || "[]"),
      };

      const FILTER_WEAKNESS = ["전체", "불", "물", "바람", "땅", "무속성"];
      const FILTER_SIZE = ["전체", "작은", "큰"];

      function getMonsterIconHTML(item, sizeClass = "w-14 h-14 text-sm", disableBg = false) {
        if (item.image) {
          const cleanFileName = item.image
            .replace(/^(\.\.\/img\/)/, "")
            .replace(/^(\.\.\/img\/monster\/)/, "")
            .trim();
          const imgPath = cleanFileName.startsWith("http") ? cleanFileName : `../img/monster/${cleanFileName}`;
          const bgClass = disableBg ? "" : "bg-zinc-100 dark:bg-[#111113] border border-zinc-200 dark:border-zinc-800 shadow-sm";
          return `<img src="${imgPath}" alt="${item.name}" class="${sizeClass} object-cover rounded-xl shrink-0 ${bgClass}" onerror="this.outerHTML='<div class=\\'${sizeClass} rounded-xl flex items-center justify-center shrink-0 font-bold text-zinc-400 bg-zinc-100 dark:bg-zinc-800\\'><i data-lucide=\\'ghost\\' class=\\'w-1/2 h-1/2 opacity-50\\'></i></div>'; lucide.createIcons();" />`;
        }
        const bgClass = disableBg ? "" : "bg-zinc-100 dark:bg-[#111113] border border-zinc-200 dark:border-zinc-800 shadow-sm";
        return `<div class="${sizeClass} rounded-xl flex items-center justify-center shrink-0 font-bold text-zinc-500 ${bgClass}"><i data-lucide="ghost" class="w-1/2 h-1/2 opacity-50"></i></div>`;
      }

      function toggleFavorite(itemId, e) {
        if (e) e.stopPropagation();
        const idx = state.favorites.indexOf(itemId);
        if (idx > -1) state.favorites.splice(idx, 1);
        else state.favorites.push(itemId);
        localStorage.setItem("lcraft_mob_favorites", JSON.stringify(state.favorites));
        renderList();
      }

      function toggleFavoritesOnly(checkbox) {
        state.favoritesOnly = checkbox.checked;
        const icon = document.getElementById("icon-star-filter");
        if (state.favoritesOnly) {
          icon.setAttribute("fill", "currentColor");
          icon.classList.add("text-amber-500");
          icon.classList.remove("text-zinc-500");
        } else {
          icon.setAttribute("fill", "none");
          icon.classList.remove("text-amber-500");
          icon.classList.add("text-zinc-500");
        }
        renderList();
      }

      function handleFilter(type, value, isChecked) {
        const stateArr = type === "weakness" ? state.weaknesses : state.sizes;
        const inputClass = type === "weakness" ? ".weakness-cb" : ".size-cb";

        if (value === "전체") {
          stateArr.length = 0; // 비우기
          document.querySelectorAll(inputClass).forEach((cb) => {
            if (cb.value !== "전체") cb.checked = false;
          });
        } else {
          const allCb = document.querySelector(`${inputClass}[value="전체"]`);
          if (allCb) allCb.checked = false;

          if (isChecked) {
            if (!stateArr.includes(value)) stateArr.push(value);
          } else {
            const index = stateArr.indexOf(value);
            if (index > -1) stateArr.splice(index, 1);
          }
          if (stateArr.length === 0) {
            if (allCb) allCb.checked = true;
          }
        }
        renderList();
      }

      function resetFilters() {
        state.searchTerm = "";
        document.getElementById("search-input").value = "";
        state.weaknesses = [];
        state.sizes = [];

        document.querySelectorAll(".weakness-cb, .size-cb").forEach((cb) => {
          cb.checked = cb.value === "전체";
        });

        renderList();
      }

      function renderFilters() {
        const renderCheckboxes = (containerId, options, type, stateArr) => {
          const container = document.getElementById(containerId);
          container.innerHTML = options
            .map((opt) => {
              const isChecked = (stateArr.length === 0 && opt === "전체") || stateArr.includes(opt);
              return `
              <label class="flex items-center gap-2.5 cursor-pointer group">
                <div class="relative flex items-center justify-center shrink-0">
                  <input type="checkbox" value="${opt}" class="custom-checkbox peer hidden ${type}-cb" onchange="handleFilter('${type}', '${opt}', this.checked)" ${isChecked ? "checked" : ""} />
                  <div class="w-4 h-4 rounded-md border-2 border-zinc-300 dark:border-zinc-600 bg-white dark:bg-zinc-900 group-hover:border-red-500 transition-colors flex items-center justify-center">
                    <i data-lucide="check" class="hidden w-3 h-3 text-white pointer-events-none stroke-[3]"></i>
                  </div>
                </div>
                <span class="text-xs font-bold text-zinc-700 dark:text-zinc-300 group-hover:text-zinc-900 dark:group-hover:text-white transition-colors">${opt}</span>
              </label>
            `;
            })
            .join("");
        };

        renderCheckboxes("filter-weakness", FILTER_WEAKNESS, "weakness", state.weaknesses);
        renderCheckboxes("filter-size", FILTER_SIZE, "size", state.sizes);
        lucide.createIcons();
      }

      function getFilteredMonsters() {
        const filtered = Object.keys(monsters_db).filter((id) => {
          const mob = monsters_db[id];
          if (state.favoritesOnly && !state.favorites.includes(id)) return false;
          if (state.searchTerm && !checkSearchMatch(id, state.searchTerm, true)) return false;

          if (state.weaknesses.length > 0) {
            const hasMatchingWeakness = Array.isArray(mob.weakness) ? mob.weakness.some((w) => state.weaknesses.includes(w)) : state.weaknesses.includes(mob.weakness);
            if (!hasMatchingWeakness) return false;
          }

          if (state.sizes.length > 0 && !state.sizes.includes(mob.size)) return false;

          return true;
        });

        // 🟢 레벨순 정렬 로직 대신, 저장해둔 시트 순서(sheetIndex)대로 오름차순 정렬
        return filtered.sort((a, b) => {
          return (monsters_db[a].sheetIndex || 0) - (monsters_db[b].sheetIndex || 0);
        });
      }
      function getWeaknessColor(weakness) {
        const target = Array.isArray(weakness) ? weakness[0] : weakness;

        switch (target) {
          case "불":
            return "text-red-500 bg-red-50 dark:bg-red-500/10 border-red-200 dark:border-red-500/20";
          case "물":
            return "text-blue-500 bg-blue-50 dark:bg-blue-500/10 border-blue-200 dark:border-blue-500/20";
          case "바람":
            return "text-emerald-500 bg-emerald-50 dark:bg-emerald-500/10 border-emerald-200 dark:border-emerald-500/20";
          case "땅":
            return "text-amber-600 bg-amber-50 dark:bg-amber-500/10 border-amber-200 dark:border-amber-500/20";
          default:
            return "text-zinc-500 bg-zinc-100 dark:bg-zinc-800 border-zinc-200 dark:border-zinc-700";
        }
      }

      function openModal(mobId) {
        const mob = monsters_db[mobId];
        if (!mob) return;

        document.getElementById("modal-category-badge").textContent = `Lv.${mob.level}`;
        document.getElementById("modal-title").textContent = mob.name;
        document.getElementById("modal-icon").innerHTML = getMonsterIconHTML(mob, "w-20 h-20 text-3xl", true);

        const tradeDiv = document.getElementById("modal-trade-info");
        tradeDiv.innerHTML = `
          <div class="px-3 py-2 border rounded-lg text-xs font-bold ${getWeaknessColor(mob.weakness)} flex items-center justify-center gap-1.5">
            취약 속성: ${mob.weakness}
          </div>
          <div class="px-3 py-2 border rounded-lg text-xs font-bold text-zinc-600 dark:text-zinc-400 bg-zinc-100 dark:bg-zinc-800 border-zinc-200 dark:border-zinc-700 flex items-center justify-center gap-1.5">
            크기: ${mob.size}
          </div>
        `;

        const statsGrid = document.getElementById("modal-stats-grid");
        statsGrid.innerHTML = `
          <div class="flex flex-col gap-1 p-2 bg-zinc-50 dark:bg-zinc-950/50 rounded-lg">
            <span class="text-[10px] font-bold text-zinc-500 flex items-center gap-1"><i data-lucide="heart" class="w-3 h-3 text-red-500"></i> HP</span>
            <span class="text-sm font-black text-zinc-900 dark:text-zinc-100">${mob.hp > 0 ? mob.hp.toLocaleString() : "?"}</span>
          </div>
          <div class="flex flex-col gap-1 p-2 bg-zinc-50 dark:bg-zinc-950/50 rounded-lg">
            <span class="text-[10px] font-bold text-zinc-500 flex items-center gap-1"><i data-lucide="droplets" class="w-3 h-3 text-blue-500"></i> MP</span>
            <span class="text-sm font-black text-zinc-900 dark:text-zinc-100">${mob.mp > 0 ? mob.mp.toLocaleString() : "0"}</span>
          </div>
          <div class="flex flex-col gap-1 p-2 bg-zinc-50 dark:bg-zinc-950/50 rounded-lg">
            <span class="text-[10px] font-bold text-zinc-500 flex items-center gap-1"><i data-lucide="shield" class="w-3 h-3 text-zinc-400"></i> AC (방어)</span>
            <span class="text-sm font-black text-zinc-900 dark:text-zinc-100">${mob.ac}</span>
          </div>
          <div class="flex flex-col gap-1 p-2 bg-zinc-50 dark:bg-zinc-950/50 rounded-lg">
            <span class="text-[10px] font-bold text-zinc-500 flex items-center gap-1"><i data-lucide="sparkles" class="w-3 h-3 text-fuchsia-500"></i> MR (마방)</span>
            <span class="text-sm font-black text-zinc-900 dark:text-zinc-100">${mob.mr}%</span>
          </div>
          <div class="flex flex-col gap-1 p-2 bg-zinc-50 dark:bg-zinc-950/50 rounded-lg col-span-2">
            <span class="text-[10px] font-bold text-zinc-500 flex items-center gap-1"><i data-lucide="star" class="w-3 h-3 text-amber-500"></i> 경험치 (EXP)</span>
            <span class="text-sm font-black text-zinc-900 dark:text-zinc-100">${mob.exp > 0 ? mob.exp.toLocaleString() : "?"}</span>
          </div>
        `;

        const descContainer = document.getElementById("modal-desc-container");
        if (mob.desc) {
          descContainer.classList.remove("hidden");
          descContainer.classList.add("flex");
          document.getElementById("modal-desc-content").textContent = mob.desc;
        } else {
          descContainer.classList.add("hidden");
          descContainer.classList.remove("flex");
        }

        const dropItemsContainer = document.getElementById("modal-drop-items");
        if (mob.drops && mob.drops.length > 0) {
          dropItemsContainer.innerHTML = mob.drops
            .map((drop) => {
              // 🟢 드롭아이템 이름을 소문자 및 공백 제거하여 items_db와 비교
              const cleanDrop = drop.replace(/\s+/g, "").toLowerCase();
              let matchedItemId = null;

              if (typeof items_db !== "undefined") {
                for (const [itemId, itemData] of Object.entries(items_db)) {
                  if (itemData.name === drop || (itemData.aliases && itemData.aliases.includes(cleanDrop))) {
                    matchedItemId = itemId;
                    break;
                  }
                }
              }

              if (matchedItemId) {
                // 🟢 아이템 정보가 매핑된 경우 클릭 가능한 버튼으로 렌더링
                return `<button type="button" onclick="showMiniItemModal('${matchedItemId}', event)" class="px-2.5 py-1 text-xs font-bold bg-amber-100 dark:bg-amber-900/40 border border-amber-300 dark:border-amber-700 text-amber-800 dark:text-amber-200 rounded shadow-sm hover:bg-amber-200 dark:hover:bg-amber-800 transition-colors flex items-center gap-1"><i data-lucide="search" class="w-3 h-3"></i>${drop}</button>`;
              } else {
                // 🔴 매핑되는 아이템이 없을 경우 기존의 일반 스팬 텍스트로 렌더링
                return `<span class="px-2.5 py-1 text-xs font-semibold bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-700 text-zinc-600 dark:text-zinc-400 rounded shadow-sm">${drop}</span>`;
              }
            })
            .join("");
        } else {
          dropItemsContainer.innerHTML = `<span class="text-sm text-zinc-500 dark:text-zinc-500">알려진 드롭 정보가 없습니다.</span>`;
        }

        lucide.createIcons();
        const modal = document.getElementById("item-modal");
        modal.classList.remove("hidden");
        document.body.style.overflow = "hidden";
      }

      function closeModal(e) {
        if (e && e.target.id !== "item-modal" && !e.target.closest("button[onclick='closeModal()']")) return;
        const modal = document.getElementById("item-modal");
        modal.classList.add("hidden");
        document.body.style.overflow = "auto";
      }

      function renderList() {
        const listIds = getFilteredMonsters();
        document.getElementById("result-count").textContent = listIds.length.toLocaleString();

        const listContainer = document.getElementById("item-list");
        const emptyState = document.getElementById("empty-state");

        if (listIds.length === 0) {
          listContainer.innerHTML = "";
          emptyState.classList.remove("hidden");
          emptyState.classList.add("flex");
          return;
        }

        emptyState.classList.add("hidden");
        emptyState.classList.remove("flex");

        listContainer.innerHTML = listIds
          .map((id) => {
            const mob = monsters_db[id];
            const isFav = state.favorites.includes(id);
            const favIconColor = isFav ? "text-amber-500 fill-amber-500" : "text-zinc-400 dark:text-zinc-600 hover:text-amber-500";
            const displayName = getHighlightedName(id, mob.name, state.searchTerm, true);

            const weakColor = getWeaknessColor(mob.weakness);

            // 🟢 배열로 바뀐 취약속성을 텍스트로 합치기
            const weaknessText = Array.isArray(mob.weakness) ? mob.weakness.join(", ") : mob.weakness;

            // 주요 드롭아이템 3개만 미리보기
            let dropPreview = "-";
            if (mob.drops && mob.drops.length > 0) {
              const drops = mob.drops
                .slice(0, 3)
                .map((d) => `<span class="bg-zinc-100 dark:bg-zinc-800/80 px-1.5 py-0.5 rounded text-zinc-700 dark:text-zinc-300 font-medium">${d}</span>`)
                .join(" ");
              dropPreview = drops + (mob.drops.length > 3 ? ` <span class="text-[10px] text-zinc-400">외 ${mob.drops.length - 3}개</span>` : "");
            }

            // 🟢 출몰지역 텍스트 결합
            const locationsText = mob.locations && mob.locations.length > 0 ? mob.locations.join(", ") : "정보 없음";

            // 🟢 특성 뱃지 HTML 생성 (보라색 포인트)
            const traitsHtml = mob.traits && mob.traits.length > 0 ? mob.traits.map((t) => `<span class="px-1.5 py-0.5 rounded border border-purple-200 dark:border-purple-800 text-[10px] font-bold text-purple-600 dark:text-purple-400 bg-purple-50 dark:bg-purple-900/20">${t}</span>`).join("") : "";

            return `
            <div onclick="openModal('${id}')" data-info-id="${id}" class="relative bg-white dark:bg-[#1c1c1f] border border-zinc-200 dark:border-[#2c2c35] rounded-2xl p-4 sm:p-5 flex flex-col group shadow-sm dark:shadow-none transition-all h-full card-hover-fx cursor-pointer select-none hover:border-red-400 dark:hover:border-red-500/60 hover:shadow-md dark:hover:bg-zinc-900/80">
                
                <div class="flex justify-between items-center mb-2 shrink-0">
                <button onclick="toggleFavorite('${id}', event)" class="flex items-center gap-1 ${favIconColor} hover:opacity-80 transition-opacity">
                    <i data-lucide="star" class="w-5 h-5"></i>
                </button>
                <div class="flex gap-1">
                    ${traitsHtml} <span class="text-[10px] font-bold ${weakColor} px-1.5 py-0.5 rounded border">취약: ${weaknessText}</span>
                </div>
                </div>

                <div class="flex flex-col sm:flex-row gap-3">
                
                <div class="flex items-center gap-3 sm:w-[45%] xl:w-[45%] shrink-0 pr-2">
                    ${getMonsterIconHTML(mob, "w-14 h-14 text-sm")}
                    <div class="flex flex-col min-w-0 pt-0.5">
                    <span class="text-[10px] sm:text-[11px] font-bold text-zinc-500 dark:text-zinc-400 leading-none mb-1 flex items-center gap-1">
                        <span class="bg-zinc-100 dark:bg-zinc-800 px-1.5 py-0.5 rounded border border-zinc-200 dark:border-zinc-700">Lv.${mob.level}</span>
                        <span class="bg-zinc-100 dark:bg-zinc-800 px-1.5 py-0.5 rounded border border-zinc-200 dark:border-zinc-700">${mob.size}</span>
                    </span>
                    <span class="text-[16px] sm:text-[17px] font-extrabold text-zinc-900 dark:text-zinc-100 leading-tight break-keep" style="word-break: keep-all;">${displayName}</span>
                    <span class="text-[10px] font-medium text-zinc-500 dark:text-zinc-500 mt-1 line-clamp-1 flex items-center gap-0.5">
                        <i data-lucide="map-pin" class="w-3 h-3"></i> ${locationsText}
                    </span>
                    </div>
                </div>

                <div class="flex-1 flex flex-row text-[11px] sm:text-[12px] text-zinc-600 dark:text-zinc-400 shrink-0 mt-2 sm:mt-0 items-center">
                    <div class="grid grid-cols-2 gap-x-2 gap-y-1 w-full pl-0 sm:pl-3 border-l-0 sm:border-l border-zinc-100 dark:border-zinc-800/80">
                    <span class="flex justify-between font-bold text-zinc-700 dark:text-zinc-300 bg-red-50 dark:bg-red-950/20 px-2 py-0.5 rounded"><span class="text-zinc-500">HP</span> ${mob.hp > 0 ? mob.hp.toLocaleString() : "?"}</span>
                    <span class="flex justify-between font-bold text-zinc-700 dark:text-zinc-300 bg-blue-50 dark:bg-blue-950/20 px-2 py-0.5 rounded"><span class="text-zinc-500">MP</span> ${mob.mp > 0 ? mob.mp.toLocaleString() : "0"}</span>
                    <span class="flex justify-between font-bold text-zinc-700 dark:text-zinc-300 bg-zinc-50 dark:bg-zinc-900/50 px-2 py-0.5 rounded"><span class="text-zinc-500">AC</span> ${mob.ac}</span>
                    <span class="flex justify-between font-bold text-zinc-700 dark:text-zinc-300 bg-zinc-50 dark:bg-zinc-900/50 px-2 py-0.5 rounded"><span class="text-zinc-500">MR</span> ${mob.mr}%</span>
                    </div>
                </div>

                </div>

                <div class="flex-1 min-h-[4px]"></div>
                
                <div class="w-full h-px bg-zinc-100 dark:bg-[#2c2c35] my-3"></div>

                <div class="flex flex-col gap-1.5 shrink-0 text-[11px] sm:text-[12px]">
                <div class="flex items-start gap-1.5">
                    <span class="font-bold text-zinc-500 dark:text-zinc-500 shrink-0 mt-0.5"><i data-lucide="gift" class="w-3.5 h-3.5"></i></span>
                    <span class="leading-snug break-keep text-zinc-800 dark:text-zinc-300 flex flex-wrap gap-1 items-center">${dropPreview}</span>
                </div>
                </div>
            </div>
            `;
          })
          .join("");

        lucide.createIcons();
        syncHeaderHeight();
      }

      document.getElementById("search-input").addEventListener("input", (e) => {
        state.searchTerm = e.target.value;
        if (state.searchTerm !== "") {
          state.weaknesses = [];
          state.sizes = [];

          document.querySelectorAll(".weakness-cb, .size-cb").forEach((cb) => {
            cb.checked = cb.value === "전체";
          });
          renderFilters();
        }
        renderList();
      });

      // 🟢 아이템 미니 모달 오픈 및 데이터 바인딩 함수 추가
      function showMiniItemModal(itemId, e) {
        if (e) e.stopPropagation();
        const item = items_db[itemId];
        if (!item) return;

        document.getElementById("mini-item-title").textContent = item.name;
        document.getElementById("mini-item-category").textContent = item.type || item.category;

        const iconContainer = document.getElementById("mini-item-icon");
        if (item.image) {
          const cleanFileName = item.image
            .replace(/^(\.\.\/img\/)/, "")
            .replace(/^(\.\.\/img\/item\/)/, "")
            .trim();
          const imgPath = cleanFileName.startsWith("http") ? cleanFileName : `../img/item/${cleanFileName}`;
          iconContainer.innerHTML = `<img src="${imgPath}" alt="${item.name}" class="w-10 h-10 object-contain" onerror="this.outerHTML='<i data-lucide=\\'help-circle\\' class=\\'w-8 h-8 opacity-50\\'></i>'; lucide.createIcons();" />`;
        } else {
          iconContainer.innerHTML = `<i data-lucide="help-circle" class="w-8 h-8 opacity-50"></i>`;
        }

        const descContainer = document.getElementById("mini-item-desc");
        descContainer.innerHTML = item.desc ? `<div class="bg-zinc-100 dark:bg-zinc-800/50 p-2 rounded text-xs line-clamp-3">${item.desc}</div>` : "";

        const statsContainer = document.getElementById("mini-item-stats");
        if (item.stats && item.stats.length > 0) {
          statsContainer.innerHTML = item.stats
            .map((s) => {
              return `<div class="bg-white dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 p-2 rounded flex flex-col gap-0.5">
                    <span class="text-[10px] text-zinc-500 font-bold">${s.label}</span>
                    <span class="font-bold text-zinc-900 dark:text-zinc-100">${s.value}</span>
                  </div>`;
            })
            .join("");
        } else {
          statsContainer.innerHTML = `<div class="col-span-2 text-center text-zinc-500 py-2">상세 스탯이 없습니다.</div>`;
        }

        lucide.createIcons();
        document.getElementById("mini-item-modal").classList.remove("hidden");
      }

      function closeMiniItemModal(e) {
        if (e && e.target.id !== "mini-item-modal" && !e.target.closest("button[onclick='closeMiniItemModal()']")) return;
        document.getElementById("mini-item-modal").classList.add("hidden");
      }

      async function init() {
        const isLoaded = await loadDatabaseFromSheet();
        if (!isLoaded) return;

        renderFilters();
        renderList();

        lucide.createIcons();
        window.parent.postMessage({ type: "REQUEST_THEME" }, "*");

        syncHeaderHeight();

        const loader = document.getElementById("loading-overlay");
        if (loader) {
          loader.classList.add("opacity-0", "pointer-events-none");
          setTimeout(() => loader.remove(), 300);
        }
      }

      init();
    </script>
  </body>
</html>
