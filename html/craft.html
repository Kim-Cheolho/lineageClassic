<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L-Crafting Guide</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>

    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: { sans: ["Inter", "sans-serif"] },
          },
        },
      };
      (function () {
        try {
          if (localStorage.getItem("lineageGlobalTheme") === "light") {
            document.documentElement.classList.remove("dark");
          } else {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>

    <script src="../js/data.js"></script>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap");

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background-color: #52525b;
        border-radius: 20px;
      }
      .tree-children.hidden {
        display: none;
      }
      .is-resizing * {
        user-select: none !important;
        cursor: col-resize !important;
      }
    </style>
  </head>
  <body class="transition-colors duration-300 dark bg-zinc-50 dark:bg-zinc-950 text-zinc-800 dark:text-zinc-200 font-sans" id="body-root">
    <div id="loading-overlay" class="fixed inset-0 z-[200] bg-zinc-50 dark:bg-zinc-950 flex flex-col items-center justify-center transition-opacity duration-500">
      <div class="relative w-16 h-16 flex items-center justify-center mb-5">
        <div class="absolute inset-0 border-4 border-indigo-200 dark:border-indigo-900/50 rounded-full"></div>
        <div class="absolute inset-0 border-4 border-indigo-500 rounded-full border-t-transparent animate-spin"></div>
        <i data-lucide="database" class="w-6 h-6 text-indigo-500 animate-pulse"></i>
      </div>
      <span class="text-sm font-bold text-zinc-600 dark:text-zinc-400 animate-pulse">데이터베이스 동기화 중...</span>
    </div>

    <div class="lg:h-[100dvh] min-h-screen flex flex-col lg:overflow-hidden">
      <header class="bg-white dark:bg-zinc-950 border-b border-zinc-200 dark:border-zinc-800 shrink-0 flex flex-col z-10 transition-colors duration-300">
        <div class="max-w-[1400px] mx-auto w-full">
          <div class="px-4 py-3 flex items-center gap-3">
            <div class="flex-1 flex items-center px-4 py-2 bg-zinc-50 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-700 rounded-2xl shadow-inner focus-within:border-amber-500 focus-within:ring-1 focus-within:ring-amber-500/30 transition-colors">
              <i data-lucide="search" class="w-5 h-5 text-zinc-400 dark:text-zinc-500 mr-2 shrink-0"></i>
              <input type="text" id="search-input" placeholder="아이템/재료 검색" class="bg-transparent border-none outline-none w-full text-sm font-medium text-zinc-900 dark:text-zinc-100 placeholder-zinc-400 dark:placeholder-zinc-600" autocomplete="off" />
            </div>

            <div class="flex items-center gap-2 shrink-0">
              <div class="flex items-center gap-1.5 px-3 py-2 bg-indigo-50 dark:bg-indigo-500/10 border border-indigo-100 dark:border-indigo-500/20 rounded-xl">
                <i data-lucide="layout-grid" class="w-4 h-4 text-indigo-600 dark:text-indigo-400 block"></i>
                <span class="text-xs font-bold text-zinc-700 dark:text-zinc-300">검색결과 <strong id="result-count" class="text-indigo-600 dark:text-indigo-400 text-sm ml-0.5">0</strong>건</span>
              </div>
              <label class="flex items-center cursor-pointer group" title="즐겨찾기 보기">
                <input type="checkbox" id="toggle-favorites" class="hidden" onchange="toggleFavoritesOnly(this)" />
                <div class="w-9 h-9 rounded-xl bg-zinc-50 dark:bg-zinc-800 flex items-center justify-center border border-zinc-200 dark:border-zinc-700 group-hover:border-amber-500 transition-colors cursor-pointer">
                  <i data-lucide="star" id="icon-star-filter" class="w-4 h-4 text-zinc-400 group-hover:text-amber-500 transition-colors block"></i>
                </div>
              </label>
            </div>
          </div>
          <div id="category-tabs" class="px-4 pb-3 flex gap-2 overflow-x-auto no-scrollbar"></div>
        </div>
      </header>

      <div class="flex-1 w-full max-w-[1400px] mx-auto flex flex-col lg:flex-row h-auto lg:h-full lg:overflow-hidden bg-white dark:bg-zinc-950 lg:border-x border-zinc-200 dark:border-zinc-800 shadow-xl shadow-zinc-200/50 dark:shadow-none">
        <aside id="left-panel" class="relative w-full lg:w-[240px] h-[35vh] lg:h-full flex flex-col bg-white dark:bg-zinc-900/50 border-b-4 lg:border-b-0 border-zinc-200 dark:border-zinc-800 shrink-0 overflow-hidden transition-colors duration-300">
          <div id="sidebar-list" class="flex-1 custom-scrollbar p-2 flex flex-col gap-1 overflow-y-auto" onscroll="checkSidebarScroll(this)"></div>
          <div id="scroll-indicator" class="pointer-events-none absolute bottom-0 left-0 right-0 h-10 bg-gradient-to-t from-zinc-200 dark:from-zinc-900 to-transparent flex items-end justify-center lg:hidden transition-opacity duration-300 opacity-0">
            <span class="text-[10px] text-zinc-600 dark:text-zinc-400 font-bold mb-1 animate-bounce">⬇ 스크롤하여 더보기</span>
          </div>
        </aside>

        <div id="resizer-left" class="hidden lg:flex w-2 justify-center items-center cursor-col-resize bg-zinc-200 dark:bg-zinc-800 hover:bg-amber-500/50 transition-colors z-20 shrink-0 group">
          <div class="w-[2px] h-8 bg-zinc-400 dark:bg-zinc-500 group-hover:bg-white rounded-full"></div>
        </div>

        <main id="main-content" class="w-full lg:flex-1 flex flex-col h-auto lg:h-full lg:overflow-y-auto bg-white dark:bg-zinc-950 shrink-0 lg:shrink transition-colors duration-300"></main>

        <div id="resizer-right" class="hidden lg:flex w-2 justify-center items-center cursor-col-resize bg-zinc-200 dark:bg-zinc-800 hover:bg-amber-500/50 transition-colors z-20 shrink-0 group">
          <div class="w-[2px] h-8 bg-zinc-400 dark:bg-zinc-500 group-hover:bg-white rounded-full"></div>
        </div>

        <aside id="right-panel" class="w-full lg:w-[320px] h-auto lg:h-full flex flex-col bg-zinc-50 dark:bg-zinc-900 border-t lg:border-t-0 shrink-0 lg:overflow-y-auto transition-colors duration-300"></aside>
      </div>
    </div>

    <script>
      window.addEventListener("message", (event) => {
        if (event.data.type === "THEME_CHANGE") {
          const html = document.documentElement;
          const body = document.getElementById("body-root");
          if (event.data.isDark) {
            html.classList.add("dark");
            body.classList.add("dark");
            state.isDarkMode = true;
          } else {
            html.classList.remove("dark");
            body.classList.remove("dark");
            state.isDarkMode = false;
          }
        }

        if (event.data.type === "DATA_BACKGROUND_UPDATED") {
          const parentWin = window.parent || window;
          if (parentWin.__SHARED_ITEMS_DB__) {
            items_db = parentWin.__SHARED_ITEMS_DB__;
            recipes_db = parentWin.__SHARED_RECIPES_DB__;

            const changedIds = event.data.changedIds || [];
            if (changedIds.length === 0) return;

            changedIds.forEach((id) => {
              const sidebarItem = document.querySelector(`#sidebar-list [data-item-id="${id}"]`);
              if (sidebarItem) {
                const item = items_db[id];
                const recipe = recipes_db[id];
                const nameSpan = sidebarItem.querySelector("span.truncate.flex-1");
                if (nameSpan) nameSpan.innerHTML = getHighlightedName(id, item.name, state.searchTerm);

                const badgeSpan = sidebarItem.querySelector("span.text-\\[10px\\].font-bold.shrink-0");
                if (badgeSpan && recipe && recipe.npc) badgeSpan.textContent = recipe.npc;
              }
            });

            const isTyping = document.activeElement && document.activeElement.tagName === "INPUT";
            if (!isTyping) {
              if (changedIds.includes(state.selectedItemId)) {
                const openNodes = Array.from(document.querySelectorAll('#main-content [data-open="true"]')).map((el) => el.closest(".recipe-node").querySelector(".font-medium")?.textContent);

                renderMain();
                renderRightPanel();

                document.querySelectorAll("#main-content .recipe-node").forEach((node) => {
                  const name = node.querySelector(".font-medium")?.textContent;
                  if (openNodes.includes(name)) {
                    const btn = node.querySelector("[data-open]");
                    if (btn) {
                      btn.setAttribute("data-open", "true");
                      btn.innerHTML = `<i data-lucide="chevron-down" class="w-3.5 h-3.5"></i>`;
                      const children = node.querySelector(".tree-children");
                      if (children) children.classList.remove("hidden");
                    }
                  }
                });
                lucide.createIcons();
              } else {
                renderRightPanel();
                lucide.createIcons();
              }
            }
          }
        }
      });

      let state = {
        isDarkMode: true,
        searchTerm: "",
        selectedCategory: "weapon",
        selectedItemId: "싸울아비 장검",
        unitPrices: JSON.parse(localStorage.getItem("lcraft_unit_prices") || "{}"),
        previousCategory: "weapon",
        buyMode: {},
        craftQuantity: "1",
        adenaRate: localStorage.getItem("lcraft_adena_rate") || "",
        favorites: JSON.parse(localStorage.getItem("lcraft_favorites") || "[]"),
        favoritesOnly: false,
      };

      const categories = [
        { id: "all", name: "전체" },
        { id: "weapon", name: "무기" },
        { id: "armor", name: "방어구" },
        { id: "accessory", name: "장신구" },
        { id: "material", name: "재료" },
      ];

      const calculateFinalMaterials = (itemId, requiredCount = 1, isRoot = true, useCeil = true) => {
        const recipe = recipes_db[itemId];

        if ((!isRoot && state.buyMode[itemId]) || !recipe || !recipe.materials || recipe.materials.length === 0) {
          return { [itemId]: requiredCount };
        }

        const finalMats = {};
        const yieldAmount = recipe.yield || 1;
        const craftTimes = useCeil ? Math.ceil(requiredCount / yieldAmount) : requiredCount / yieldAmount;

        for (const mat of recipe.materials) {
          const childMats = calculateFinalMaterials(mat.id, mat.count * craftTimes, false, useCeil);
          for (const [childId, childCount] of Object.entries(childMats)) {
            finalMats[childId] = (finalMats[childId] || 0) + childCount;
          }
        }
        return finalMats;
      };

      function getItemIconHTML(item, sizeClass = "w-8 h-8 text-sm") {
        if (item.image) {
          const cleanFileName = item.image.replace(/^(\.\.\/img\/)/, "").trim();
          const imgPath = cleanFileName.startsWith("http") ? cleanFileName : `../img/item/${cleanFileName}`;
          return `<img src="${imgPath}" alt="${item.name}" class="${sizeClass} object-cover rounded bg-zinc-100 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700" />`;
        }
        return `<div class="${sizeClass} bg-zinc-100 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded flex items-center justify-center">${item.icon || ""}</div>`;
      }

      function renderCategories() {
        const container = document.getElementById("category-tabs");
        container.innerHTML = categories
          .map((cat) => {
            const isSelected = state.selectedCategory === cat.id;
            const classes = isSelected ? "bg-amber-50 dark:bg-amber-500/10 text-amber-600 dark:text-amber-400 border-amber-200 dark:border-amber-500/30 shadow-sm font-bold" : "bg-transparent border-transparent text-zinc-500 dark:text-zinc-400 hover:bg-zinc-100 dark:hover:bg-zinc-800";
            return `<button onclick="setCategory('${cat.id}')" class="px-4 py-1.5 rounded-md text-sm whitespace-nowrap transition-colors border ${classes}">${cat.name}</button>`;
          })
          .join("");
      }

      function getFilteredList() {
        const list = Object.keys(items_db).filter((id) => {
          if (!recipes_db[id]) return false;
          const item = items_db[id];
          if (state.favoritesOnly && !state.favorites.includes(id)) return false;
          if (state.searchTerm) {
            if (!checkSearchMatch(id, state.searchTerm)) return false;
          } else {
            if (state.selectedCategory !== "all" && item.category !== state.selectedCategory) return false;
          }
          return true;
        });

        return list.sort((a, b) => {
          const npcA = recipes_db[a].npc || "";
          const npcB = recipes_db[b].npc || "";
          const npcCompare = npcA.localeCompare(npcB, "ko-KR");
          if (npcCompare !== 0) return npcCompare;
          const nameA = items_db[a].name;
          const nameB = items_db[b].name;
          return nameA.localeCompare(nameB, "ko-KR");
        });
      }

      function toggleFavorite(itemId, e) {
        if (e) e.stopPropagation();
        const idx = state.favorites.indexOf(itemId);
        if (idx > -1) state.favorites.splice(idx, 1);
        else state.favorites.push(itemId);

        localStorage.setItem("lcraft_favorites", JSON.stringify(state.favorites));
        renderSidebar();
        if (state.selectedItemId === itemId) renderMain();
      }

      function toggleFavoritesOnly(checkbox) {
        state.favoritesOnly = checkbox.checked;
        const iconContainer = document.getElementById("icon-star-filter");

        if (state.favoritesOnly) {
          iconContainer.classList.add("text-amber-500", "fill-amber-500");
          iconContainer.classList.remove("text-zinc-400");

          // 즐겨찾기 활성화 시 '전체' 탭으로 자동 이동하여 모든 목록 표시
          if (state.selectedCategory !== "all") {
            state.previousCategory = state.selectedCategory;
            state.selectedCategory = "all";
            renderCategories();
          }
        } else {
          iconContainer.classList.remove("text-amber-500", "fill-amber-500");
          iconContainer.classList.add("text-zinc-400");

          // 즐겨찾기 해제 시 (검색 중이 아니라면) 이전 탭으로 스마트하게 복귀
          if (!state.searchTerm) {
            state.selectedCategory = state.previousCategory || "all";
            renderCategories();
          }
        }
        renderSidebar();
      }

      function checkSidebarScroll(elem) {
        const indicator = document.getElementById("scroll-indicator");
        if (!indicator) return;
        if (elem.scrollHeight <= elem.clientHeight || Math.ceil(elem.scrollTop + elem.clientHeight) >= elem.scrollHeight - 5) {
          indicator.style.opacity = "0";
        } else {
          indicator.style.opacity = "1";
        }
      }

      function renderSidebar() {
        const filteredList = getFilteredList();
        document.getElementById("result-count").innerHTML = filteredList.length.toLocaleString();

        const container = document.getElementById("sidebar-list");
        container.classList.remove("gap-1");
        container.classList.add("gap-2");

        let currentThemeIndex = 1;
        let lastNpcName = null;
        const badgeThemes = ["bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600/80 dark:text-indigo-400/80 border-indigo-100 dark:border-indigo-800/50", "bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600/80 dark:text-emerald-400/80 border-emerald-100 dark:border-emerald-800/50"];

        container.innerHTML = filteredList
          .map((id) => {
            const item = items_db[id];
            const recipe = recipes_db[id];
            const isSelected = id === state.selectedItemId;
            const isFav = state.favorites.includes(id);
            const favIconColor = isFav ? "text-amber-500 fill-amber-500" : "text-zinc-300 dark:text-zinc-600 hover:text-amber-500";
            const classes = isSelected ? "bg-zinc-200 dark:bg-zinc-800 text-zinc-900 dark:text-white border-zinc-300 dark:border-zinc-700 shadow-sm" : "hover:bg-zinc-100 dark:hover:bg-zinc-800/50 text-zinc-700 dark:text-zinc-300 border-transparent";

            const currentNpc = recipe && recipe.npc ? recipe.npc : "";
            if (currentNpc !== "" && currentNpc !== lastNpcName) {
              currentThemeIndex = currentThemeIndex === 0 ? 1 : 0;
              lastNpcName = currentNpc;
            }
            const currentBadgeClass = badgeThemes[currentThemeIndex];
            const displayName = getHighlightedName(id, item.name, state.searchTerm);

            return `
          <div onclick="selectItem('${id}')" class="flex items-center gap-3 py-2.5 px-3 rounded cursor-pointer transition-colors border ${classes} overflow-hidden shrink-0">
            ${getItemIconHTML(item, "w-8 h-8 text-xs shrink-0")}
            <div class="flex items-center gap-1.5 flex-1 min-w-0 overflow-hidden">
              <button onclick="toggleFavorite('${id}', event)" class="shrink-0 w-4 h-4 flex items-center justify-center outline-none ${favIconColor} transition-colors">
                <i data-lucide="star" class="w-full h-full"></i>
              </button>
              <span class="text-sm font-medium truncate leading-relaxed">${displayName}</span>
            </div>
            ${recipe && recipe.npc ? `<span class="text-[10px] font-bold shrink-0 truncate max-w-[70px] px-1.5 py-0.5 rounded border ${currentBadgeClass}">${recipe.npc}</span>` : ""}
          </div>
        `;
          })
          .join("");

        setTimeout(() => checkSidebarScroll(container), 50);
        lucide.createIcons();
      }

      function toggleBuyMode(itemId, e) {
        if (e) e.stopPropagation();
        state.buyMode[itemId] = !state.buyMode[itemId];
        renderMain();
        renderRightPanel();
      }

      function generateRecipeNodeHTML(itemId, requiredCount, depth = 0) {
        const item = items_db[itemId];
        const recipe = recipes_db[itemId];
        const hasChildren = recipe && recipe.materials && recipe.materials.length > 0;
        const isBuyMode = !!state.buyMode[itemId];

        const isMatchedKeyword = state.searchTerm && checkSearchMatch(itemId, state.searchTerm);
        const shouldAutoExpand = isMatchedKeyword && hasChildren && !isBuyMode;

        const displayDataOpen = shouldAutoExpand ? "true" : "false";
        const displayIcon = shouldAutoExpand ? `<i data-lucide="chevron-down" class="w-3.5 h-3.5"></i>` : `<i data-lucide="chevron-right" class="w-3.5 h-3.5"></i>`;
        const displayHiddenClass = shouldAutoExpand ? "" : "hidden";

        const displayName = getHighlightedName(itemId, item.name, state.searchTerm);

        let yieldAmount = 1;
        let craftTimes = requiredCount;
        if (recipe) {
          yieldAmount = recipe.yield || 1;
          craftTimes = Math.ceil(requiredCount / yieldAmount);
        }

        const buttonTheme = isBuyMode
          ? "bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 border-blue-200 dark:border-blue-800/50 hover:bg-blue-100 dark:hover:bg-blue-800/80 shadow-sm"
          : "bg-amber-50 dark:bg-amber-900/30 text-amber-600 dark:text-amber-400 border-amber-200 dark:border-amber-800/50 hover:bg-amber-100 dark:hover:bg-amber-800/80 shadow-sm";

        const buttonText = isBuyMode ? `<i data-lucide="hammer" class="w-3 h-3"></i> 직접 제작` : `<i data-lucide="shopping-cart" class="w-3 h-3"></i> 직접 구매`;

        let html = `<div class="recipe-node w-full text-sm font-sans">`;

        html += `
        <div ${hasChildren && !isBuyMode ? `onclick="toggleTreeNode(this.querySelector('[data-open]'))"` : ""} class="flex flex-wrap items-center gap-x-2 gap-y-1.5 py-1.5 px-2 rounded hover:bg-zinc-100 dark:hover:bg-zinc-900 transition-colors group ${hasChildren && !isBuyMode ? "cursor-pointer select-none" : ""}" style="padding-left: ${depth * 20 + 8}px">
          
          <div class="flex items-center gap-2 pointer-events-none ${isBuyMode ? "opacity-50 grayscale-[50%]" : ""}">
            ${hasChildren ? `<span class="text-zinc-400 flex items-center justify-center w-[14px] h-[14px]" data-open="${displayDataOpen}">${displayIcon}</span>` : `<span class="w-[14px]"></span>`}
            ${getItemIconHTML(item, "w-5 h-5 text-[10px] shrink-0")}
            <span class="text-zinc-800 dark:text-zinc-200 font-medium break-keep">${displayName}</span>
            <span class="text-amber-600 dark:text-amber-500 text-xs font-bold shrink-0 whitespace-nowrap">× ${requiredCount.toLocaleString()}</span>
            ${yieldAmount > 1 ? `<span class="text-[10px] font-medium text-emerald-600 dark:text-emerald-400 bg-emerald-500/10 px-1.5 py-0.5 rounded leading-none shrink-0 whitespace-nowrap">(1회 제작 시 ${yieldAmount}개 획득)</span>` : ""}
          </div>

          ${
            hasChildren
              ? `
          <button onclick="toggleBuyMode('${itemId}', event)" class="pointer-events-auto flex items-center gap-1 px-1.5 py-0.5 text-[10px] rounded border transition-colors ${buttonTheme}">
            ${buttonText}
          </button>
          `
              : ""
          }

          ${
            recipe && (recipe.npc || recipe.location)
              ? `
          <div class="flex items-center gap-1 shrink-0 ml-auto pointer-events-none ${isBuyMode ? "opacity-50 grayscale-[50%]" : ""}">
            ${recipe.npc ? `<span class="text-[10px] md:text-[11px] font-bold bg-indigo-100 dark:bg-indigo-900/50 text-indigo-700 dark:text-indigo-300 px-2 py-0.5 rounded shadow-sm whitespace-nowrap">${recipe.npc}</span>` : ""}
            ${recipe.location ? `<span class="text-[10px] md:text-[11px] font-bold bg-emerald-100 dark:bg-emerald-900/50 text-emerald-700 dark:text-emerald-300 px-2 py-0.5 rounded shadow-sm whitespace-nowrap">${recipe.location}</span>` : ""}
          </div>`
              : ""
          }
        </div>
      `;

        if (hasChildren && !isBuyMode) {
          html += `<div class="relative tree-children block ${displayHiddenClass}">`;
          html += `<div class="absolute top-0 bottom-0 border-l border-zinc-200 dark:border-zinc-800" style="left: ${depth * 20 + 14}px"></div>`;
          html += `<div class="flex flex-col">`;
          recipe.materials.forEach((mat) => {
            html += generateRecipeNodeHTML(mat.id, mat.count * craftTimes, depth + 1);
          });
          html += `</div></div>`;
        }

        html += `</div>`;
        return html;
      }

      function renderMain() {
        const container = document.getElementById("main-content");
        const item = items_db[state.selectedItemId];
        const recipe = recipes_db[state.selectedItemId];

        if (!item || !recipe) {
          container.innerHTML = `<div class="flex-1 flex items-center justify-center text-zinc-400 text-sm">항목을 선택해주세요.</div>`;
          return;
        }

        const displayMainName = getHighlightedName(state.selectedItemId, item.name, state.searchTerm);
        const isFav = state.favorites.includes(state.selectedItemId);
        const favIconColor = isFav ? "text-amber-500 fill-amber-500" : "text-zinc-300 dark:text-zinc-600 hover:text-amber-500";

        let statsHTML = "";
        if (item.stats && item.stats.length > 0) {
          const statsList = item.stats
            .map(
              (stat) => `
          <div>
            <span class="text-zinc-500 text-xs block mb-0.5">${stat.label}</span>
            <span class="font-medium text-zinc-900 dark:text-zinc-200">${stat.value}</span>
          </div>`,
            )
            .join("");

          statsHTML = `
          <div class="mb-8 border border-zinc-200 dark:border-zinc-800 rounded bg-zinc-50 dark:bg-zinc-900/50">

        if (currentAdenaRate > 0) {

              </div>

      function getMaterialBreakdown(itemId, targetMatId, requiredCount = 1, isRoot = true, useCeil = false) {
        let breakdown = {};
        const recipe = recipes_db[itemId];

        if ((!isRoot && state.buyMode[itemId]) || !recipe || !recipe.materials) return breakdown;

        const yieldAmount = recipe.yield || 1;
        const craftTimes = useCeil ? Math.ceil(requiredCount / yieldAmount) : requiredCount / yieldAmount;

        recipe.materials.forEach((mat) => {
          const isTarget = mat.id === targetMatId || (items_db[mat.id] && items_db[mat.id].name === targetMatId);

          if (isTarget) {
            const amount = mat.count * craftTimes;
            breakdown[itemId] = (breakdown[itemId] || 0) + amount;
          } else {
            const childBreakdown = getMaterialBreakdown(mat.id, targetMatId, mat.count * craftTimes, false, useCeil);
            Object.entries(childBreakdown).forEach(([childId, childCount]) => {
              breakdown[childId] = (breakdown[childId] || 0) + childCount;
            });
          }
        });

        return breakdown;
      }

      function setCategory(catId) {
        state.selectedCategory = catId;

        if (!state.searchTerm) {
          state.previousCategory = catId;
        }
        renderCategories();
        renderSidebar();
      }

      function selectItem(itemId) {
        state.selectedItemId = itemId;
        state.craftQuantity = "1";
        renderSidebar();
        renderMain();
        renderRightPanel();
      }

      function handleSearch(e) {
        const value = e.target.value;
        state.searchTerm = value;

        if (value !== "") {
          if (state.selectedCategory !== "all") {
            state.previousCategory = state.selectedCategory;
          }
          state.selectedCategory = "all";
          renderCategories();
        } else {
          state.selectedCategory = state.previousCategory || "all";
          renderCategories();
        }

        renderSidebar();
      }

      function handlePriceInput(id, inputElem) {
        let rawValue = inputElem.value.replace(/[^0-9]/g, "");
        state.unitPrices[id] = rawValue === "" ? 0 : Number(rawValue);
        inputElem.value = rawValue === "" ? "" : Number(rawValue).toLocaleString();

        localStorage.setItem("lcraft_unit_prices", JSON.stringify(state.unitPrices));

        renderRightPanel();

        const newInput = document.querySelector(`input[oninput*="handlePriceInput('${id}'"]`);
        if (newInput) {
          newInput.focus();
          const valLen = newInput.value.length;
          newInput.setSelectionRange(valLen, valLen);
        }
      }

      function handleCraftQuantityInput(inputElem) {
        let rawValue = inputElem.value.replace(/[^0-9]/g, "");
        state.craftQuantity = rawValue;

        renderRightPanel();

        const newInput = document.getElementById("craft-quantity-input");
        if (newInput) {
          newInput.focus();
          const valLen = newInput.value.length;
          newInput.setSelectionRange(valLen, valLen);
        }
      }

      function handleAdenaRateInput(inputElem) {
        let rawValue = inputElem.value.replace(/[^0-9]/g, "");

      function toggleTreeNode(btn) {
        if (!btn) return;
        const isOpen = btn.getAttribute("data-open") === "true";
        btn.setAttribute("data-open", (!isOpen).toString());
        btn.innerHTML = !isOpen ? `<i data-lucide="chevron-down" class="w-3.5 h-3.5"></i>` : `<i data-lucide="chevron-right" class="w-3.5 h-3.5"></i>`;
        lucide.createIcons();

        const childrenContainer = btn.closest(".recipe-node").querySelector(".tree-children");
        if (childrenContainer) {
          if (!isOpen) childrenContainer.classList.remove("hidden");
          else childrenContainer.classList.add("hidden");
        }
      }

      function toggleAllTrees(expand) {
        const container = document.getElementById("main-content");
        if (!container) return;
        container.querySelectorAll("[data-open]").forEach((btn) => {
          const isOpen = btn.getAttribute("data-open") === "true";
          if ((expand && !isOpen) || (!expand && isOpen)) {
            btn.setAttribute("data-open", expand.toString());
            btn.innerHTML = expand ? `<i data-lucide="chevron-down" class="w-3.5 h-3.5"></i>` : `<i data-lucide="chevron-right" class="w-3.5 h-3.5"></i>`;
            const childrenContainer = btn.closest(".recipe-node").querySelector(".tree-children");
            if (childrenContainer) {
              if (expand) childrenContainer.classList.remove("hidden");
              else childrenContainer.classList.add("hidden");
            }
          }
        });
        lucide.createIcons();
      }

      function initResizers() {
        const leftPanel = document.getElementById("left-panel");
        const rightPanel = document.getElementById("right-panel");
        const updatePanelWidths = (panel, width) => {
          panel.style.width = width + "px";
          panel.style.minWidth = width + "px";
          panel.style.maxWidth = width + "px";
          panel.style.flexBasis = width + "px";
        };

        const savedWidths = JSON.parse(localStorage.getItem("lcraft_panel_widths")) || {};
        if (savedWidths.left && window.innerWidth >= 1024) updatePanelWidths(leftPanel, savedWidths.left);
        if (savedWidths.right && window.innerWidth >= 1024) updatePanelWidths(rightPanel, savedWidths.right);

        let isResizingLeft = false;
        let isResizingRight = false;
        document.getElementById("resizer-left").addEventListener("mousedown", () => {
          isResizingLeft = true;
          document.body.classList.add("is-resizing");
        });
        document.getElementById("resizer-right").addEventListener("mousedown", () => {
          isResizingRight = true;
          document.body.classList.add("is-resizing");
        });

        document.addEventListener("mousemove", (e) => {
          if (!isResizingLeft && !isResizingRight) return;

          // 전체 1400px 컨테이너의 화면상 위치와 너비를 가져옵니다.
          const containerRect = leftPanel.parentElement.getBoundingClientRect();

          if (isResizingLeft) {
            // 마우스 X좌표에서 컨테이너의 왼쪽 시작점을 빼서 실제 순수 패널 너비를 구합니다.
            let newWidth = e.clientX - containerRect.left;
            updatePanelWidths(leftPanel, Math.max(200, Math.min(newWidth, containerRect.width / 3)));
          }
          if (isResizingRight) {
            // 컨테이너 오른쪽 끝점에서 마우스 X좌표를 빼서 우측 패널 너비를 구합니다.
            let newWidth = containerRect.right - e.clientX;
            updatePanelWidths(rightPanel, Math.max(260, Math.min(newWidth, containerRect.width / 3)));
          }
        });

        document.addEventListener("mouseup", () => {
          if (isResizingLeft || isResizingRight) {
            isResizingLeft = false;
            isResizingRight = false;
            document.body.classList.remove("is-resizing");
            localStorage.setItem("lcraft_panel_widths", JSON.stringify({ left: parseInt(leftPanel.style.width) || 240, right: parseInt(rightPanel.style.width) || 320 }));
          }
        });

        window.addEventListener("resize", () => {
          if (window.innerWidth < 1024) {
            leftPanel.style.width = "";
            leftPanel.style.minWidth = "";
            leftPanel.style.maxWidth = "";
            leftPanel.style.flexBasis = "";
            rightPanel.style.width = "";
            rightPanel.style.minWidth = "";
            rightPanel.style.maxWidth = "";
            rightPanel.style.flexBasis = "";
          } else {
            const saved = JSON.parse(localStorage.getItem("lcraft_panel_widths")) || {};
            updatePanelWidths(leftPanel, saved.left || 240);
            updatePanelWidths(rightPanel, saved.right || 320);
          }
        });
      }

      function validateDatabase() {
        let hasError = false;
        for (const [recipeId, recipeData] of Object.entries(recipes_db)) {
          if (!items_db[recipeId]) {
            console.error(`🚨 [데이터 누락 오류] 레시피에는 지정되어 있으나, items_db에 [${recipeId}] 아이템이 없습니다.`);
            hasError = true;
          }
          if (recipeData.materials && Array.isArray(recipeData.materials)) {
            recipeData.materials.forEach((mat) => {
              if (!items_db[mat.id]) {
                console.error(`🚨 [재료 참조 오류] [${recipeId}] 제작에 필요한 재료인 [${mat.id}] 아이템이 items_db에 없습니다.`);
                hasError = true;
              }
            });
          }
        }
        if (hasError) console.warn("⚠️ 데이터베이스에 누락된 항목이 있습니다. 콘솔 에러를 확인하세요.");
        return !hasError;
      }

      document.getElementById("search-input").addEventListener("input", handleSearch);

      async function init() {
        const isLoaded = await loadDatabaseFromSheet();
        if (!isLoaded) return;

        validateDatabase();
        renderCategories();
        renderSidebar();
        renderMain();
        renderRightPanel();
        initResizers();

        window.parent.postMessage({ type: "REQUEST_THEME" }, "*");

        const loader = document.getElementById("loading-overlay");
        if (loader) {
          loader.classList.add("opacity-0", "pointer-events-none");
          setTimeout(() => loader.remove(), 300);
        }
      }

      init();
    </script>
  </body>
</html>
