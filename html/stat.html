<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리니지 클래식 축/저주 판별기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        /* 숫자 스피너 제거 */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }

        body {
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .bar-transition {
            transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #3f3f46; }
        
        /* 비활성화 및 토글 애니메이션 */
        .disabled-opacity { opacity: 0.3; pointer-events: none; }
        .toggle-dot { transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1); }

        /* 🟢 결과 표시 애니메이션 */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0; /* 초기 상태 투명하게 */
        }
    </style>
</head>
<body class="bg-zinc-50 dark:bg-black text-zinc-900 dark:text-zinc-100 font-sans min-h-screen selection:bg-indigo-500/30">

    <div class="max-w-[1400px] mx-auto p-4 md:p-6 lg:py-8">
        
        <!-- 상단 헤더 -->
        <div class="flex items-center justify-between mb-6 md:mb-8">
            <div>
                <h1 class="text-2xl md:text-3xl lg:text-4xl font-extrabold tracking-tight text-zinc-900 dark:text-zinc-100">
                    축/저주 판별기
                </h1>
            </div>
            
            <button onclick="toggleTheme()" class="p-3 rounded-xl bg-white dark:bg-[#121212] border border-zinc-200 dark:border-white/10 text-zinc-600 dark:text-zinc-400 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors shadow-sm">
                <i data-lucide="sun" id="theme-icon-sun" class="w-6 h-6 hidden dark:block"></i>
                <i data-lucide="moon" id="theme-icon-moon" class="w-6 h-6 block dark:hidden"></i>
            </button>
        </div>

        <!-- 메인 레이아웃 -->
        <div class="flex flex-col lg:flex-row gap-5 md:gap-6 items-stretch">
            
            <!-- 좌측 스탯 입력 패널 -->
            <div class="w-full lg:w-1/2 xl:w-[48%] flex flex-col gap-6 bg-white dark:bg-[#0a0a0a] border border-zinc-200 dark:border-white/10 shadow-xl shadow-zinc-200/50 dark:shadow-none rounded-3xl p-4 sm:p-6 md:p-8 relative h-full">
                
                <!-- 1. 클래스 선택 & 클래식 모드 토글 -->
                <div>
                    <div class="flex items-center justify-between mb-3">
                        <label class="flex items-center text-xs font-bold text-zinc-500 dark:text-zinc-400 tracking-wider uppercase">
                            <i data-lucide="crosshair" class="w-4 h-4 text-indigo-500 dark:text-indigo-400 mr-1.5"></i> 클래스 선택
                        </label>
                        
                        <label class="flex items-center gap-2 cursor-pointer group" onclick="toggleClassicModeEvent(event)">
                            <span class="text-xs font-bold text-zinc-600 dark:text-zinc-300 group-hover:text-indigo-500 dark:group-hover:text-indigo-400 transition-colors">클래식 모드 (전체 소급)</span>
                            <div class="relative w-10 h-5 bg-zinc-300 dark:bg-zinc-700 rounded-full transition-colors duration-300" id="classic-toggle-bg">
                                <div class="toggle-dot absolute left-1 top-1 bg-white w-3 h-3 rounded-full shadow-sm" id="classic-toggle-dot"></div>
                            </div>
                        </label>
                    </div>
                    <div class="grid grid-cols-4 gap-3" id="class-container">
                        <!-- JS 렌더링 영역 -->
                    </div>
                </div>

                <div class="h-px w-full bg-zinc-100 dark:bg-white/5"></div>

                <!-- 2. 기본 스탯 및 보너스 정보 입력 -->
                <div class="flex flex-row flex-wrap md:flex-nowrap gap-4 lg:gap-5 w-full">
                    
                    <!-- 레벨 (비율 30%) -->
                    <div class="flex flex-col w-full md:w-[30%]">
                        <label class="flex items-center justify-between text-xs font-bold text-zinc-500 dark:text-zinc-400 uppercase tracking-wide mb-2.5">
                            현재 레벨 <span class="bg-indigo-50 dark:bg-indigo-500/10 text-indigo-600 dark:text-indigo-400 px-1.5 py-0.5 rounded text-[10px]">LV</span>
                        </label>
                        <div class="flex items-center gap-1.5 mb-2.5">
                            <button onclick="updateState('level', -1)" class="w-8 h-8 flex-shrink-0 flex items-center justify-center rounded-lg bg-zinc-100 dark:bg-[#1a1a1a] border border-transparent dark:border-white/5 hover:bg-zinc-200 dark:hover:bg-[#222] text-zinc-600 dark:text-zinc-300 transition-colors"><i data-lucide="minus" class="w-3.5 h-3.5"></i></button>
                            <div class="flex-1 min-w-0 bg-white dark:bg-[#18181b] border border-zinc-200 dark:border-white/10 rounded-lg shadow-inner flex items-center justify-center h-8 focus-within:border-indigo-500 focus-within:ring-1 focus-within:ring-indigo-500/30">
                                <input type="number" id="input-level" oninput="handleInput('level', this.value)" onblur="handleBlur('level')" class="w-full text-center bg-transparent font-bold text-base focus:outline-none dark:text-zinc-100 min-w-0">
                            </div>
                            <button onclick="updateState('level', 1)" class="w-8 h-8 flex-shrink-0 flex items-center justify-center rounded-lg bg-zinc-100 dark:bg-[#1a1a1a] border border-transparent dark:border-white/5 hover:bg-zinc-200 dark:hover:bg-[#222] text-zinc-600 dark:text-zinc-300 transition-colors"><i data-lucide="plus" class="w-3.5 h-3.5"></i></button>
                        </div>
                        <div class="mt-auto text-center bg-zinc-50 dark:bg-[#121212] rounded-lg py-1 border border-zinc-100 dark:border-white/5">
                            <span id="bonus-points-label" class="text-[10px] font-bold text-zinc-400 dark:text-zinc-500 truncate block px-1">51렙 개방</span>
                        </div>
                    </div>
                    
                    <!-- CON (베이스 + 보너스) (비율 35%) -->
                    <div class="flex flex-col gap-2 w-[calc(50%-0.5rem)] md:w-[35%]">
                        <label class="flex items-center justify-between text-xs font-bold text-zinc-500 dark:text-zinc-400 uppercase tracking-wide mb-1">
                            CON (체력) <span id="con-total-label" class="text-zinc-400 dark:text-zinc-500 text-[11px]">총 14</span>
                        </label>
                        <div class="flex items-center gap-1 w-full">
                            <span class="text-[10px] font-bold text-zinc-400 w-8 md:w-9 flex-shrink-0 whitespace-nowrap text-right pr-0.5">베이스</span>
                            <div class="flex-1 flex items-center gap-1 min-w-0">
                                <button onclick="updateState('con', -1)" class="w-8 h-8 flex-shrink-0 flex items-center justify-center rounded-lg bg-zinc-100 dark:bg-[#1a1a1a] border border-transparent dark:border-white/5 hover:bg-zinc-200 dark:hover:bg-[#222] text-zinc-600 dark:text-zinc-300 transition-colors"><i data-lucide="minus" class="w-3.5 h-3.5"></i></button>
                                <div class="flex-1 min-w-0 bg-white dark:bg-[#18181b] border border-zinc-200 dark:border-white/10 rounded-lg shadow-inner flex items-center justify-center h-8">
                                    <input type="number" id="input-con" oninput="handleInput('con', this.value)" onblur="handleBlur('con')" class="w-full text-center bg-transparent font-bold text-base focus:outline-none dark:text-zinc-100 min-w-0">
                                </div>
                                <button onclick="updateState('con', 1)" class="w-8 h-8 flex-shrink-0 flex items-center justify-center rounded-lg bg-zinc-100 dark:bg-[#1a1a1a] border border-transparent dark:border-white/5 hover:bg-zinc-200 dark:hover:bg-[#222] text-zinc-600 dark:text-zinc-300 transition-colors"><i data-lucide="plus" class="w-3.5 h-3.5"></i></button>
                            </div>
                        </div>
                        <div class="flex items-center gap-1 w-full transition-opacity duration-300 disabled-opacity" id="wrap-bonus-con">
                            <span class="text-[10px] font-bold text-indigo-500 dark:text-indigo-400 w-8 md:w-9 flex-shrink-0 whitespace-nowrap text-right pr-0.5">+보너스</span>
                            <div class="flex-1 flex items-center gap-1 min-w-0">
                                <button onclick="updateState('bonusCon', -1)" class="w-8 h-8 flex-shrink-0 flex items-center justify-center rounded-lg bg-indigo-50 dark:bg-indigo-500/10 border border-transparent dark:border-indigo-500/20 hover:bg-indigo-100 dark:hover:bg-indigo-500/20 text-indigo-600 dark:text-indigo-400 transition-colors"><i data-lucide="minus" class="w-3.5 h-3.5"></i></button>
                                <div class="flex-1 min-w-0 bg-white dark:bg-[#18181b] border border-indigo-200 dark:border-indigo-500/30 rounded-lg shadow-inner flex items-center justify-center h-8">
                                    <input type="number" id="input-bonusCon" oninput="handleInput('bonusCon', this.value)" onblur="handleBlur('bonusCon')" class="w-full text-center bg-transparent font-bold text-base text-indigo-600 dark:text-indigo-400 focus:outline-none min-w-0">
                                </div>
                                <button onclick="updateState('bonusCon', 1)" class="w-8 h-8 flex-shrink-0 flex items-center justify-center rounded-lg bg-indigo-50 dark:bg-indigo-500/10 border border-transparent dark:border-indigo-500/20 hover:bg-indigo-100 dark:hover:bg-indigo-500/20 text-indigo-600 dark:text-indigo-400 transition-colors"><i data-lucide="plus" class="w-3.5 h-3.5"></i></button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- WIS (베이스 + 보너스) (비율 35%) -->
                    <div class="flex flex-col gap-2 w-[calc(50%-0.5rem)] md:w-[35%]">
                        <label class="flex items-center justify-between text-xs font-bold text-zinc-500 dark:text-zinc-400 uppercase tracking-wide mb-1">
                            WIS (마나) <span id="wis-total-label" class="text-zinc-400 dark:text-zinc-500 text-[11px]">총 9</span>
                        </label>
                        <div class="flex items-center gap-1 w-full">
                            <span class="text-[10px] font-bold text-zinc-400 w-8 md:w-9 flex-shrink-0 whitespace-nowrap text-right pr-0.5">베이스</span>
                            <div class="flex-1 flex items-center gap-1 min-w-0">
                                <button onclick="updateState('wis', -1)" class="w-8 h-8 flex-shrink-0 flex items-center justify-center rounded-lg bg-zinc-100 dark:bg-[#1a1a1a] border border-transparent dark:border-white/5 hover:bg-zinc-200 dark:hover:bg-[#222] text-zinc-600 dark:text-zinc-300 transition-colors"><i data-lucide="minus" class="w-3.5 h-3.5"></i></button>
                                <div class="flex-1 min-w-0 bg-white dark:bg-[#18181b] border border-zinc-200 dark:border-white/10 rounded-lg shadow-inner flex items-center justify-center h-8">
                                    <input type="number" id="input-wis" oninput="handleInput('wis', this.value)" onblur="handleBlur('wis')" class="w-full text-center bg-transparent font-bold text-base focus:outline-none dark:text-zinc-100 min-w-0">
                                </div>
                                <button onclick="updateState('wis', 1)" class="w-8 h-8 flex-shrink-0 flex items-center justify-center rounded-lg bg-zinc-100 dark:bg-[#1a1a1a] border border-transparent dark:border-white/5 hover:bg-zinc-200 dark:hover:bg-[#222] text-zinc-600 dark:text-zinc-300 transition-colors"><i data-lucide="plus" class="w-3.5 h-3.5"></i></button>
                            </div>
                        </div>
                        <div class="flex items-center gap-1 w-full transition-opacity duration-300 disabled-opacity" id="wrap-bonus-wis">
                            <span class="text-[10px] font-bold text-indigo-500 dark:text-indigo-400 w-8 md:w-9 flex-shrink-0 whitespace-nowrap text-right pr-0.5">+보너스</span>
                            <div class="flex-1 flex items-center gap-1 min-w-0">
                                <button onclick="updateState('bonusWis', -1)" class="w-8 h-8 flex-shrink-0 flex items-center justify-center rounded-lg bg-indigo-50 dark:bg-indigo-500/10 border border-transparent dark:border-indigo-500/20 hover:bg-indigo-100 dark:hover:bg-indigo-500/20 text-indigo-600 dark:text-indigo-400 transition-colors"><i data-lucide="minus" class="w-3.5 h-3.5"></i></button>
                                <div class="flex-1 min-w-0 bg-white dark:bg-[#18181b] border border-indigo-200 dark:border-indigo-500/30 rounded-lg shadow-inner flex items-center justify-center h-8">
                                    <input type="number" id="input-bonusWis" oninput="handleInput('bonusWis', this.value)" onblur="handleBlur('bonusWis')" class="w-full text-center bg-transparent font-bold text-base text-indigo-600 dark:text-indigo-400 focus:outline-none min-w-0">
                                </div>
                                <button onclick="updateState('bonusWis', 1)" class="w-8 h-8 flex-shrink-0 flex items-center justify-center rounded-lg bg-indigo-50 dark:bg-indigo-500/10 border border-transparent dark:border-indigo-500/20 hover:bg-indigo-100 dark:hover:bg-indigo-500/20 text-indigo-600 dark:text-indigo-400 transition-colors"><i data-lucide="plus" class="w-3.5 h-3.5"></i></button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="h-px w-full bg-zinc-100 dark:bg-white/5"></div>

                <!-- 3. 현재 순수 HP/MP 입력 -->
                <div class="flex flex-col gap-4 flex-1 justify-center">
                    
                    <!-- HP 패널 -->
                    <div class="bg-zinc-50 dark:bg-[#121212] border-2 border-red-300 dark:border-red-500/40 rounded-3xl p-4 sm:p-5 md:p-6 flex flex-col gap-4 transition-colors hover:border-red-400 dark:hover:border-red-500/60 shadow-sm shadow-red-100/50 dark:shadow-none">
                        <div class="flex justify-between items-end">
                            <label class="text-base font-extrabold text-zinc-800 dark:text-zinc-100 flex items-center gap-2">
                                <i data-lucide="heart" class="w-5 h-5 text-red-500"></i> 순수 HP
                                <!-- 🟢 장비 제외 텍스트 삭제됨 -->
                            </label>
                            <span id="expected-hp-label" class="text-xs font-mono font-bold text-zinc-500 dark:text-zinc-400">15 + 117 (7.8)</span>
                        </div>
                        <div class="flex items-center justify-between gap-1 sm:gap-2 w-full">
                            <button onclick="updateState('hp', -10)" class="w-9 h-9 sm:w-11 sm:h-11 md:w-12 md:h-12 flex-shrink-0 flex items-center justify-center rounded-xl bg-white dark:bg-[#1a1a1a] border border-zinc-200 dark:border-white/5 hover:bg-red-50 dark:hover:bg-red-500/10 text-red-500 dark:text-red-400 transition-all font-mono text-[10px] sm:text-xs font-bold shadow-sm dark:shadow-none">-10</button>
                            <button onclick="updateState('hp', -1)" class="w-9 h-9 sm:w-11 sm:h-11 md:w-12 md:h-12 flex-shrink-0 flex items-center justify-center rounded-xl bg-white dark:bg-[#1a1a1a] border border-zinc-200 dark:border-white/5 hover:bg-red-50 dark:hover:bg-red-500/10 text-red-500 dark:text-red-400 transition-all shadow-sm dark:shadow-none"><i data-lucide="minus" class="w-4 h-4 sm:w-5 sm:h-5"></i></button>
                            
                            <div class="flex-1 min-w-0 bg-white dark:bg-[#18181b] border border-zinc-200 dark:border-white/10 rounded-xl shadow-inner flex items-center justify-center h-9 sm:h-11 md:h-12 focus-within:border-red-500 focus-within:ring-1 focus-within:ring-red-500/30">
                                <input type="number" id="input-hp" oninput="handleInput('hp', this.value)" onblur="handleBlur('hp')" min="0" class="w-full text-center bg-transparent font-black text-xl sm:text-2xl md:text-3xl text-red-600 dark:text-red-500 focus:outline-none min-w-0">
                            </div>
                            
                            <button onclick="updateState('hp', 1)" class="w-9 h-9 sm:w-11 sm:h-11 md:w-12 md:h-12 flex-shrink-0 flex items-center justify-center rounded-xl bg-white dark:bg-[#1a1a1a] border border-zinc-200 dark:border-white/5 hover:bg-red-50 dark:hover:bg-red-500/10 text-red-500 dark:text-red-400 transition-all shadow-sm dark:shadow-none"><i data-lucide="plus" class="w-4 h-4 sm:w-5 sm:h-5"></i></button>
                            <button onclick="updateState('hp', 10)" class="w-9 h-9 sm:w-11 sm:h-11 md:w-12 md:h-12 flex-shrink-0 flex items-center justify-center rounded-xl bg-white dark:bg-[#1a1a1a] border border-zinc-200 dark:border-white/5 hover:bg-red-50 dark:hover:bg-red-500/10 text-red-500 dark:text-red-400 transition-all font-mono text-[10px] sm:text-xs font-bold shadow-sm dark:shadow-none">+10</button>
                        </div>
                    </div>

                    <!-- MP 패널 -->
                    <div class="bg-zinc-50 dark:bg-[#121212] border-2 border-blue-300 dark:border-blue-500/40 rounded-3xl p-4 sm:p-5 md:p-6 flex flex-col gap-4 transition-colors hover:border-blue-400 dark:hover:border-blue-500/60 shadow-sm shadow-blue-100/50 dark:shadow-none">
                        <div class="flex justify-between items-end">
                            <label class="text-base font-extrabold text-zinc-800 dark:text-zinc-100 flex items-center gap-2">
                                <i data-lucide="droplets" class="w-5 h-5 text-blue-500"></i> 순수 MP
                                <!-- 🟢 장비 제외 텍스트 삭제됨 -->
                            </label>
                            <span id="expected-mp-label" class="text-xs font-mono font-bold text-zinc-500 dark:text-zinc-400">4 + 65 (4.3)</span>
                        </div>
                        <div class="flex items-center justify-between gap-1 sm:gap-2 w-full">
                            <button onclick="updateState('mp', -10)" class="w-9 h-9 sm:w-11 sm:h-11 md:w-12 md:h-12 flex-shrink-0 flex items-center justify-center rounded-xl bg-white dark:bg-[#1a1a1a] border border-zinc-200 dark:border-white/5 hover:bg-blue-50 dark:hover:bg-blue-500/10 text-blue-500 dark:text-blue-400 transition-all font-mono text-[10px] sm:text-xs font-bold shadow-sm dark:shadow-none">-10</button>
                            <button onclick="updateState('mp', -1)" class="w-9 h-9 sm:w-11 sm:h-11 md:w-12 md:h-12 flex-shrink-0 flex items-center justify-center rounded-xl bg-white dark:bg-[#1a1a1a] border border-zinc-200 dark:border-white/5 hover:bg-blue-50 dark:hover:bg-blue-500/10 text-blue-500 dark:text-blue-400 transition-all shadow-sm dark:shadow-none"><i data-lucide="minus" class="w-4 h-4 sm:w-5 sm:h-5"></i></button>
                            
                            <div class="flex-1 min-w-0 bg-white dark:bg-[#18181b] border border-zinc-200 dark:border-white/10 rounded-xl shadow-inner flex items-center justify-center h-9 sm:h-11 md:h-12 focus-within:border-blue-500 focus-within:ring-1 focus-within:ring-blue-500/30">
                                <input type="number" id="input-mp" oninput="handleInput('mp', this.value)" onblur="handleBlur('mp')" class="w-full text-center bg-transparent font-black text-xl sm:text-2xl md:text-3xl text-blue-600 dark:text-blue-500 focus:outline-none min-w-0">
                            </div>
                            
                            <button onclick="updateState('mp', 1)" class="w-9 h-9 sm:w-11 sm:h-11 md:w-12 md:h-12 flex-shrink-0 flex items-center justify-center rounded-xl bg-white dark:bg-[#1a1a1a] border border-zinc-200 dark:border-white/5 hover:bg-blue-50 dark:hover:bg-blue-500/10 text-blue-500 dark:text-blue-400 transition-all shadow-sm dark:shadow-none"><i data-lucide="plus" class="w-4 h-4 sm:w-5 sm:h-5"></i></button>
                            <button onclick="updateState('mp', 10)" class="w-9 h-9 sm:w-11 sm:h-11 md:w-12 md:h-12 flex-shrink-0 flex items-center justify-center rounded-xl bg-white dark:bg-[#1a1a1a] border border-zinc-200 dark:border-white/5 hover:bg-blue-50 dark:hover:bg-blue-500/10 text-blue-500 dark:text-blue-400 transition-all font-mono text-[10px] sm:text-xs font-bold shadow-sm dark:shadow-none">+10</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 우측 결과 표시 패널 -->
            <div class="w-full lg:w-1/2 xl:w-[52%] flex flex-col h-full bg-white dark:bg-[#0a0a0a] border border-zinc-200 dark:border-white/10 shadow-xl shadow-zinc-200/50 dark:shadow-none rounded-3xl p-4 sm:p-6 md:p-8">
                
                <div id="result-container" class="flex-1 flex flex-col gap-4 h-full">
                    
                    <!-- 등급표 -->
                    <div>
                        <div class="flex items-center justify-between mb-3">
                            <h3 class="text-xs font-bold text-zinc-500 dark:text-zinc-400 tracking-wider uppercase flex items-center gap-1.5"><i data-lucide="bar-chart-2" class="w-4 h-4"></i> 판정 기준표</h3>
                        </div>
                        <div class="grid grid-cols-5 gap-2 text-center">
                            <div class="flex flex-col gap-1 p-2 md:p-2.5 rounded-xl bg-amber-50 dark:bg-amber-500/10 border border-amber-200 dark:border-amber-500/20">
                                <span class="font-black text-amber-500 dark:text-amber-400 text-lg md:text-xl">S</span><span class="text-zinc-500 dark:text-amber-400/80 font-mono text-[10px] md:text-[11px] font-bold">0~5%</span>
                            </div>
                            <div class="flex flex-col gap-1 p-2 md:p-2.5 rounded-xl bg-fuchsia-50 dark:bg-fuchsia-500/10 border border-fuchsia-200 dark:border-fuchsia-500/20">
                                <span class="font-black text-fuchsia-500 dark:text-fuchsia-400 text-lg md:text-xl">A</span><span class="text-zinc-500 dark:text-fuchsia-400/80 font-mono text-[10px] md:text-[11px] font-bold">6~20%</span>
                            </div>
                            <div class="flex flex-col gap-1 p-2 md:p-2.5 rounded-xl bg-emerald-50 dark:bg-emerald-500/10 border border-emerald-200 dark:border-emerald-500/20">
                                <!-- 🟢 수정: 21~80% -> 21~70% -->
                                <span class="font-black text-emerald-500 dark:text-emerald-400 text-lg md:text-xl">B</span><span class="text-zinc-500 dark:text-emerald-400/80 font-mono text-[10px] md:text-[11px] font-bold">21~70%</span>
                            </div>
                            <div class="flex flex-col gap-1 p-2 md:p-2.5 rounded-xl bg-orange-50 dark:bg-orange-500/10 border border-orange-200 dark:border-orange-500/20">
                                <!-- 🟢 수정: 81~95% -> 71~90% -->
                                <span class="font-black text-orange-500 dark:text-orange-400 text-lg md:text-xl">C</span><span class="text-zinc-500 dark:text-orange-400/80 font-mono text-[10px] md:text-[11px] font-bold">71~90%</span>
                            </div>
                            <div class="flex flex-col gap-1 p-2 md:p-2.5 rounded-xl bg-red-50 dark:bg-red-500/10 border border-red-200 dark:border-red-500/20">
                                <!-- 🟢 수정: 96~100% -> 91~100% -->
                                <span class="font-black text-red-500 dark:text-red-400 text-lg md:text-xl">F</span><span class="text-zinc-500 dark:text-red-400/80 font-mono text-[10px] md:text-[11px] font-bold">91~100%</span>
                            </div>
                        </div>
                    </div>

                    <!-- 대기 상태창 -->
                    <div id="waiting-area" class="flex-1 flex flex-col items-center justify-center bg-zinc-50 dark:bg-transparent rounded-3xl p-8 text-center border border-dashed border-zinc-300 dark:border-zinc-800">
                        <div class="w-16 h-16 bg-white dark:bg-[#121212] rounded-2xl flex items-center justify-center mb-5 border border-zinc-200 dark:border-white/5 shadow-sm">
                            <i data-lucide="pie-chart" class="w-8 h-8 text-zinc-400 dark:text-zinc-500"></i>
                        </div>
                        <h3 class="text-lg font-bold text-zinc-800 dark:text-zinc-200 mb-2">분석 대기중</h3>
                        <p class="text-sm text-zinc-500 dark:text-zinc-500 leading-relaxed">
                            좌측 패널에서 레벨 2 이상의 스탯을 입력하시면<br>축/저주 판별 결과가 실시간으로 분석됩니다.
                        </p>
                    </div>

                    <!-- 결과 표시창 -->
                    <div id="result-area" class="hidden flex-col justify-center gap-4 w-full flex-1">
                        <!-- 동적으로 렌더링됨 -->
                    </div>

                </div>

            </div>
        </div>
    </div>

    <script>
        // 아이콘 렌더링 로직
        let iconRetryCount = 0;
        function renderIcons() {
            try {
                if (window.lucide && window.lucide.createIcons) {
                    window.lucide.createIcons();
                } else if (iconRetryCount < 20) {
                    iconRetryCount++;
                    setTimeout(renderIcons, 50);
                }
            } catch(e) {
                console.warn('아이콘 로드 실패', e);
            }
        }

        // 클래스 베이스 데이터
        const CLASS_INFO = {
            knight: { id: 'knight', name: '기사', icon: 'sword', baseCon: 14, baseWis: 9, baseHp: 16, baseMp: 1 },
            elf: { id: 'elf', name: '요정', icon: 'crosshair', baseCon: 12, baseWis: 12, baseHp: 15, baseMp: 4 },
            wizard: { id: 'wizard', name: '마법사', icon: 'wand-2', baseCon: 12, baseWis: 12, baseHp: 12, baseMp: 6 },
            royal: { id: 'royal', name: '군주', icon: 'crown', baseCon: 10, baseWis: 11, baseHp: 14, baseMp: 2 }
        };

        // 앱 상태(State) - 🟢 isClassicMode 기본값 true
        let state = {
            charClass: 'knight',
            level: 1,
            con: 14,
            wis: 9,
            bonusCon: 0,
            bonusWis: 0,
            hp: 16,
            mp: 1,
            isDarkMode: false,
            isClassicMode: true, 
            isHpModifiedByUser: false,
            isMpModifiedByUser: false
        };

        function saveState() {
            try {
                if (typeof window.localStorage !== 'undefined') {
                    localStorage.setItem('lineageCalculatorState', JSON.stringify(state));
                }
            } catch (e) {
                // Ignore Sandbox errors
            }
        }

        function loadState() {
            try {
                if (typeof window.localStorage !== 'undefined') {
                    const savedState = localStorage.getItem('lineageCalculatorState');
                    if (savedState) {
                        const parsed = JSON.parse(savedState);
                        state = { ...state, ...parsed };
                        
                        if(typeof state.bonusCon !== 'number') state.bonusCon = 0;
                        if(typeof state.bonusWis !== 'number') state.bonusWis = 0;
                        // 로컬 스토리지에 값이 없더라도 기본적으로 true가 되도록 폴백 처리
                        if(typeof state.isClassicMode !== 'boolean') state.isClassicMode = true; 

                        const html = document.documentElement;
                        if (state.isDarkMode) {
                            html.classList.add('dark');
                        } else {
                            html.classList.remove('dark');
                        }
                        
                        updateClassicToggleUI();
                        return true; 
                    }
                }
            } catch (e) { }
            return false; 
        }

        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            state.isDarkMode = html.classList.contains('dark');
            saveState(); 
        }

        function toggleClassicModeEvent(e) {
            e.preventDefault(); 
            state.isClassicMode = !state.isClassicMode;
            updateClassicToggleUI();
            
            if (!state.isHpModifiedByUser) {
                const effectiveCon = state.isClassicMode ? state.con + state.bonusCon : state.con;
                state.hp = getBaseHp(state.charClass, effectiveCon);
            }
            
            syncInputs();
            renderExpectedLabels();
            calculateResult();
            saveState();
        }

        function updateClassicToggleUI() {
            const bg = document.getElementById('classic-toggle-bg');
            const dot = document.getElementById('classic-toggle-dot');
            if(!bg || !dot) return;
            if(state.isClassicMode) {
                bg.classList.remove('bg-zinc-300', 'dark:bg-zinc-700');
                bg.classList.add('bg-indigo-500');
                dot.style.transform = 'translateX(1.25rem)';
            } else {
                bg.classList.remove('bg-indigo-500');
                bg.classList.add('bg-zinc-300', 'dark:bg-zinc-700');
                dot.style.transform = 'translateX(0)';
            }
        }

        function initApp() {
            try {
                if (!loadState()) {
                    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                        state.isDarkMode = true;
                        document.documentElement.classList.add('dark');
                    }
                    updateClassicToggleUI();
                }
            } catch(e) {}

            renderClassSelector();
            
            if (state.charClass) {
                Object.keys(CLASS_INFO).forEach(id => {
                    const btn = document.getElementById(`btn-cls-${id}`);
                    if(btn) {
                        if (id === state.charClass) btn.classList.add('border-indigo-500', 'bg-indigo-50', 'dark:bg-indigo-500/10', 'text-indigo-600', 'dark:text-indigo-400');
                        else btn.classList.remove('border-indigo-500', 'bg-indigo-50', 'dark:bg-indigo-500/10', 'text-indigo-600', 'dark:text-indigo-400');
                    }
                });
                syncInputs();
                renderExpectedLabels();
                calculateResult();
            } else {
                setCharClass('knight', true); 
            }
            
            renderIcons();
        }

        function renderClassSelector() {
            const container = document.getElementById('class-container');
            container.innerHTML = Object.values(CLASS_INFO).map(cls => `
                <button onclick="setCharClass('${cls.id}')" id="btn-cls-${cls.id}" class="flex flex-col items-center justify-center py-3 md:py-3.5 px-2 rounded-2xl border border-zinc-200 dark:border-white/10 bg-zinc-50 dark:bg-[#121212] text-zinc-500 dark:text-zinc-400 hover:border-indigo-300 dark:hover:border-indigo-500/50 hover:text-indigo-500 dark:hover:text-indigo-400 transition-all font-medium">
                    <i data-lucide="${cls.icon}" class="w-5 h-5 mb-1.5"></i>
                    <span class="text-xs tracking-wide">${cls.name}</span>
                </button>
            `).join('');
            
            renderIcons();
        }

        function setCharClass(classId, isInit = false) {
            state.charClass = classId;
            state.con = CLASS_INFO[classId].baseCon;
            state.wis = CLASS_INFO[classId].baseWis;
            state.bonusCon = 0;
            state.bonusWis = 0;
            
            const effectiveCon = state.isClassicMode ? state.con + state.bonusCon : state.con;

            if (isInit) {
                state.hp = getBaseHp(classId, effectiveCon);
                state.mp = CLASS_INFO[classId].baseMp;
            } else {
                if (!state.isHpModifiedByUser) {
                    state.hp = getBaseHp(classId, effectiveCon);
                }
                if (!state.isMpModifiedByUser) {
                    state.mp = CLASS_INFO[classId].baseMp;
                }
            }

            Object.keys(CLASS_INFO).forEach(id => {
                const btn = document.getElementById(`btn-cls-${id}`);
                if(!btn) return;
                btn.classList.remove('border-indigo-500', 'bg-indigo-50', 'dark:bg-indigo-500/10', 'text-indigo-600', 'dark:text-indigo-400');
                btn.classList.add('border-zinc-200', 'dark:border-white/10', 'bg-zinc-50', 'dark:bg-[#121212]', 'text-zinc-500', 'dark:text-zinc-400');
                
                if (id === classId) {
                    btn.classList.remove('border-zinc-200', 'dark:border-white/10', 'bg-zinc-50', 'dark:bg-[#121212]', 'text-zinc-500', 'dark:text-zinc-400');
                    btn.classList.add('border-indigo-500', 'bg-indigo-50', 'dark:bg-indigo-500/10', 'text-indigo-600', 'dark:text-indigo-400');
                }
            });

            syncInputs();
            renderExpectedLabels();
            calculateResult();
            saveState(); 
        }

        function handleInput(key, value) {
            let cleanVal = value.replace(/[^0-9]/g, '');

            if (key === 'hp' || key === 'mp') {
                state[key === 'hp' ? 'isHpModifiedByUser' : 'isMpModifiedByUser'] = true;
                if (cleanVal.length > 4) cleanVal = cleanVal.slice(0, 4);
            } else if (key === 'level') {
                if (parseInt(cleanVal, 10) > 99) cleanVal = '99';
            }

            const inputEl = document.getElementById(`input-${key}`);
            if(inputEl) inputEl.value = cleanVal;

            if (cleanVal === '') {
                state[key] = 0; 
            } else {
                state[key] = parseInt(cleanVal, 10) || 0;
            }
            renderExpectedLabels();
            calculateResult(); 
            saveState(); 
        }

        function handleBlur(key) {
            if (key === 'level') {
                const lvlInput = document.getElementById('input-level');
                if (lvlInput && lvlInput.value === '') state.level = 1;
                state.level = Math.max(1, Math.min(99, state.level));
            }
            if (key === 'con') {
                const conInput = document.getElementById('input-con');
                if (conInput && conInput.value === '') state.con = CLASS_INFO[state.charClass].baseCon;
                state.con = Math.max(CLASS_INFO[state.charClass].baseCon, Math.min(18, state.con));
            }
            if (key === 'wis') {
                const wisInput = document.getElementById('input-wis');
                if (wisInput && wisInput.value === '') state.wis = CLASS_INFO[state.charClass].baseWis;
                state.wis = Math.max(CLASS_INFO[state.charClass].baseWis, Math.min(18, state.wis));
            }
            
            // 보너스 스탯 상한선 계산
            let maxBonus = Math.max(0, state.level - 50);
            
            let conRoom = Math.max(0, 25 - state.con);
            let availableForCon = Math.max(0, maxBonus - state.bonusWis);
            state.bonusCon = Math.max(0, Math.min(conRoom, Math.min(availableForCon, state.bonusCon || 0)));

            let wisRoom = Math.max(0, 25 - state.wis);
            let availableForWis = Math.max(0, maxBonus - state.bonusCon);
            state.bonusWis = Math.max(0, Math.min(wisRoom, Math.min(availableForWis, state.bonusWis || 0)));

            if (key === 'hp') {
                const hpInput = document.getElementById('input-hp');
                if (hpInput && hpInput.value === '') {
                    const effectiveCon = state.isClassicMode ? state.con + state.bonusCon : state.con;
                    state.hp = getBaseHp(state.charClass, effectiveCon);
                    state.isHpModifiedByUser = false; 
                } else {
                    state.hp = Math.max(1, state.hp);
                }
            }
            if (key === 'mp') {
                const mpInput = document.getElementById('input-mp');
                if (mpInput && mpInput.value === '') {
                    state.mp = CLASS_INFO[state.charClass].baseMp;
                    state.isMpModifiedByUser = false; 
                } else {
                    state.mp = Math.max(0, state.mp);
                }
            }
            
            syncInputs();
            renderExpectedLabels();
            calculateResult();
            saveState(); 
        }

        function updateState(key, delta) {
            if (key === 'hp') state.isHpModifiedByUser = true;
            if (key === 'mp') state.isMpModifiedByUser = true;

            state[key] += delta;
            handleBlur(key); 
        }

        function syncInputs() {
            const keys = ['level', 'con', 'wis', 'bonusCon', 'bonusWis', 'hp', 'mp'];
            keys.forEach(k => {
                const el = document.getElementById(`input-${k}`);
                if(el) el.value = state[k];
            });
        }

        function renderExpectedLabels() {
            let maxBonus = Math.max(0, state.level - 50);
            let usedBonus = state.bonusCon + state.bonusWis;
            let remainBonus = maxBonus - usedBonus;
            
            const wrapCon = document.getElementById('wrap-bonus-con');
            const wrapWis = document.getElementById('wrap-bonus-wis');
            const bonusLabel = document.getElementById('bonus-points-label');
            
            if (state.level > 50) {
                if(wrapCon) wrapCon.classList.remove('disabled-opacity');
                if(wrapWis) wrapWis.classList.remove('disabled-opacity');
                if(bonusLabel) {
                    bonusLabel.innerText = `잔여 보너스: ${remainBonus}pt`;
                    bonusLabel.classList.remove('text-zinc-400', 'dark:text-zinc-500');
                    bonusLabel.classList.add('text-indigo-600', 'dark:text-indigo-400');
                }
            } else {
                if(wrapCon) wrapCon.classList.add('disabled-opacity');
                if(wrapWis) wrapWis.classList.add('disabled-opacity');
                if(bonusLabel) {
                    bonusLabel.innerText = `51렙부터 개방`;
                    bonusLabel.classList.remove('text-indigo-600', 'dark:text-indigo-400');
                    bonusLabel.classList.add('text-zinc-400', 'dark:text-zinc-500');
                }
            }

            const totalCon = state.con + state.bonusCon;
            const totalWis = state.wis + state.bonusWis;
            
            const conTotalLabel = document.getElementById('con-total-label');
            const wisTotalLabel = document.getElementById('wis-total-label');
            
            if(conTotalLabel) {
                conTotalLabel.innerText = `총 ${totalCon}`;
                if(totalCon > state.con) {
                    conTotalLabel.classList.remove('text-zinc-400', 'dark:text-zinc-500');
                    conTotalLabel.classList.add('text-indigo-500', 'dark:text-indigo-400');
                } else {
                    conTotalLabel.classList.add('text-zinc-400', 'dark:text-zinc-500');
                    conTotalLabel.classList.remove('text-indigo-500', 'dark:text-indigo-400');
                }
            }
            if(wisTotalLabel) {
                wisTotalLabel.innerText = `총 ${totalWis}`;
                if(totalWis > state.wis) {
                    wisTotalLabel.classList.remove('text-zinc-400', 'dark:text-zinc-500');
                    wisTotalLabel.classList.add('text-indigo-500', 'dark:text-indigo-400');
                } else {
                    wisTotalLabel.classList.add('text-zinc-400', 'dark:text-zinc-500');
                    wisTotalLabel.classList.remove('text-indigo-500', 'dark:text-indigo-400');
                }
            }

            const baseConForLabel = state.isClassicMode ? totalCon : state.con;
            const baseHp = getBaseHp(state.charClass, baseConForLabel);
            const levelUps = Math.max(1, state.level - 1);
            const gainedHp = state.hp - baseHp;
            const avgHpPerLevel = state.level > 1 ? (gainedHp / levelUps).toFixed(1) : "0.0";
            
            const expHpEl = document.getElementById('expected-hp-label');
            if(expHpEl) expHpEl.innerText = `${baseHp} + ${Math.max(0, gainedHp)} (${avgHpPerLevel})`;

            const baseMp = CLASS_INFO[state.charClass].baseMp;
            const gainedMp = state.mp - baseMp;
            const avgMpPerLevel = state.level > 1 ? (gainedMp / levelUps).toFixed(1) : "0.0";
            const expMpEl = document.getElementById('expected-mp-label');
            if(expMpEl) expMpEl.innerText = `${baseMp} + ${Math.max(0, gainedMp)} (${avgMpPerLevel})`;
        }

        function getBaseHp(classId, con) {
            const base = CLASS_INFO[classId].baseHp;
            const threshold = 15;
            return con <= threshold ? base : base + (con - threshold);
        }

        function getHpGrowth(classId, con) {
            switch(classId) {
                case 'knight':
                    if(con <= 15) return { min: 6, max: 12, avg: 9 };
                    if(con <= 24) return { min: 6 + (con - 15), max: 12 + (con - 15), avg: 9 + (con - 15) };
                    return { min: 16, max: 22, avg: 19 };
                case 'elf':
                    if(con <= 15) return { min: 5, max: 10, avg: 7.5 };
                    if(con <= 17) return { min: 5 + (con - 15), max: 10 + (con - 15), avg: 7.5 + (con - 15) };
                    return { min: 8, max: 13, avg: 10.5 };
                case 'wizard':
                    if(con <= 15) return { min: 3, max: 6, avg: 4.5 };
                    if(con <= 20) return { min: 3 + (con - 15), max: 6 + (con - 15), avg: 4.5 + (con - 15) };
                    return { min: 9, max: 12, avg: 10.5 };
                case 'royal':
                    if(con <= 15) return { min: 5, max: 10, avg: 7.5 };
                    if(con <= 20) return { min: 5 + (con - 15), max: 10 + (con - 15), avg: 7.5 + (con - 15) };
                    return { min: 11, max: 16, avg: 13.5 };
                default: return { min: 0, max: 0, avg: 0 };
            }
        }

        function getMpGrowth(classId, wis) {
            switch(classId) {
                case 'knight':
                    if(wis <= 9) return { min: 0, max: 2, avg: 1 };
                    return { min: 0, max: 3, avg: 1.5 };
                case 'elf':
                    if(wis <= 11) return { min: 3, max: 4, avg: 3.5 };
                    if(wis <= 14) return { min: 3, max: 6, avg: 4.5 };
                    if(wis <= 17) return { min: 4, max: 7, avg: 17/3 }; 
                    if(wis <= 20) return { min: 4, max: 9, avg: 26/4 }; 
                    return { min: 6, max: 10, avg: 32/4 }; 
                case 'wizard':
                    if(wis <= 14) return { min: 4, max: 8, avg: 6 };
                    if(wis === 15) return { min: 6, max: 10, avg: 8 };
                    if(wis === 16) return { min: 6, max: 11, avg: 8.5 };
                    if(wis === 17) return { min: 7, max: 11, avg: 9 };
                    if(wis === 18) return { min: 7, max: 12, avg: 9.5 };
                    if(wis <= 20) return { min: 6, max: 12, avg: 9 };
                    if(wis <= 23) return { min: 8, max: 14, avg: 11 };
                    if(wis === 24) return { min: 8, max: 16, avg: 12 };
                    return { min: 10, max: 16, avg: 13 };
                case 'royal':
                    if(wis <= 10) return { min: 2, max: 3, avg: 2.5 };
                    if(wis <= 14) return { min: 2, max: 4, avg: 3 };
                    if(wis <= 17) return { min: 3, max: 5, avg: 4 };
                    return { min: 3, max: 6, avg: 4.5 };
                default: return { min: 0, max: 0, avg: 0 };
            }
        }

        // 🟢 랜덤 메시지 출력 함수 적용
        function getGrade(topPercent) {

                S: [
                    '완벽한 난수 분배! 서버 1티어 유전자입니다.',

                    '이 캐릭터에 더 이상의 투자는 매몰 비용일 뿐입니다.',
                    '엔씨의 서버가 당신을 억까하고 있습니다. 새 출발을 하세요.',
                    '심해의 저주캐... 당장 리세마라를 시작하십시오.'
                ]
            };

            const getRandomMsg = (grade) => messages[grade][Math.floor(Math.random() * messages[grade].length)];

            if (topPercent <= 5) return { grade: 'S', color: 'text-amber-500 dark:text-amber-400', bg: 'bg-amber-400 dark:bg-amber-400', border: 'border-amber-400/50 dark:border-amber-400/30', label: getRandomMsg('S') };
            if (topPercent <= 20) return { grade: 'A', color: 'text-fuchsia-500 dark:text-fuchsia-400', bg: 'bg-fuchsia-400 dark:bg-fuchsia-400', border: 'border-fuchsia-400/50 dark:border-fuchsia-400/30', label: getRandomMsg('A') };
            
            // 🟢 수정: 기준 수치를 70과 90으로 변경
            if (topPercent <= 70) return { grade: 'B', color: 'text-emerald-500 dark:text-emerald-400', bg: 'bg-emerald-400 dark:bg-emerald-400', border: 'border-emerald-400/50 dark:border-emerald-400/30', label: getRandomMsg('B') };
            if (topPercent <= 90) return { grade: 'C', color: 'text-orange-500 dark:text-orange-400', bg: 'bg-orange-400 dark:bg-orange-400', border: 'border-orange-400/50 dark:border-orange-400/30', label: getRandomMsg('C') };
            
            return { grade: 'F', color: 'text-red-500 dark:text-red-400', bg: 'bg-red-500 dark:bg-red-500', border: 'border-red-500/50 dark:border-red-500/30', label: getRandomMsg('F') };
        }

        function calculateResult() {
            const waitingArea = document.getElementById('waiting-area');
            const resultArea = document.getElementById('result-area');
            
            if(!waitingArea || !resultArea) return;

            if (state.level < 2) {
                waitingArea.classList.remove('hidden');
                waitingArea.classList.add('flex');
                resultArea.classList.add('hidden');
                resultArea.classList.remove('flex');
                return;
            }
            
            waitingArea.classList.add('hidden');
            waitingArea.classList.remove('flex');
            resultArea.classList.remove('hidden');
            resultArea.classList.add('flex');
            
            let minHp, maxHp, avgHp;
            let minMp, maxMp, avgMp;

            // 🟢 현재 베이스 스탯에 따른 성장량 계산
            const totalCon = state.con + state.bonusCon;
            const totalWis = state.wis + state.bonusWis;
            const currentHpGrowth = getHpGrowth(state.charClass, totalCon);
            const currentMpGrowth = getMpGrowth(state.charClass, totalWis);

            if (state.isClassicMode) {
                const baseHpClassic = getBaseHp(state.charClass, totalCon);
                const baseMpClassic = CLASS_INFO[state.charClass].baseMp;

                minHp = baseHpClassic; maxHp = baseHpClassic; avgHp = baseHpClassic;
                minMp = baseMpClassic; maxMp = baseMpClassic; avgMp = baseMpClassic;

                const hpGrowth = getHpGrowth(state.charClass, totalCon);
                const mpGrowth = getMpGrowth(state.charClass, totalWis);

                for (let lvl = 2; lvl <= state.level; lvl++) {
                    minHp += hpGrowth.min; maxHp += hpGrowth.max; avgHp += hpGrowth.avg;
                    minMp += mpGrowth.min; maxMp += mpGrowth.max; avgMp += mpGrowth.avg;
                }

            } else {
                minHp = getBaseHp(state.charClass, state.con);
                maxHp = minHp; avgHp = minHp;
                
                minMp = CLASS_INFO[state.charClass].baseMp;
                maxMp = minMp; avgMp = minMp;

                let activeBonusCon = 0;
                let activeBonusWis = 0;

                for (let lvl = 2; lvl <= state.level; lvl++) {
                    if (lvl > 50) {
                        if (activeBonusCon < state.bonusCon) {
                            activeBonusCon++;
                        } else if (activeBonusWis < state.bonusWis) {
                            activeBonusWis++;
                        }
                    }

                    let effCon = state.con + activeBonusCon;
                    let hpGrowth = getHpGrowth(state.charClass, effCon);
                    minHp += hpGrowth.min; maxHp += hpGrowth.max; avgHp += hpGrowth.avg;

                    let effWis = state.wis + activeBonusWis;
                    let mpGrowth = getMpGrowth(state.charClass, effWis);
                    minMp += mpGrowth.min; maxMp += mpGrowth.max; avgMp += mpGrowth.avg;
                }
            }
            
            let hpPercent = maxHp !== minHp ? ((maxHp - state.hp) / (maxHp - minHp)) * 100 : 100;
            hpPercent = Math.max(0, Math.min(100, hpPercent));
            const hpGrade = getGrade(hpPercent);

            let mpPercent = maxMp !== minMp ? ((maxMp - state.mp) / (maxMp - minMp)) * 100 : 100;
            mpPercent = Math.max(0, Math.min(100, mpPercent));
            const mpGrade = getGrade(mpPercent);

            // 🟢 결과 카드 생성 (성장량 표시 UI 추가)
            const createCard = (title, icon, type, percent, gradeInfo, min, avg, max, delayIdx, growth) => `
                <div class="animate-fade-in-up border ${gradeInfo.border} rounded-3xl p-5 relative overflow-hidden flex-1 flex flex-col justify-center bg-zinc-50 dark:bg-[#121212]" style="animation-delay: ${delayIdx * 0.15}s">
                    <div class="absolute -right-2 -top-2 opacity-5 pointer-events-none">
                        <i data-lucide="${icon}" class="w-32 h-32 text-zinc-900 dark:text-white"></i>
                    </div>
                    
                    <div class="flex items-center justify-between mb-4 relative z-10">
                        <div>
                            <h3 class="text-lg font-extrabold flex items-center gap-1.5 ${type === 'hp' ? 'text-red-500 dark:text-red-400' : 'text-blue-500 dark:text-blue-400'}">
                                <i data-lucide="${icon}" class="w-5 h-5"></i> ${title} 분석
                            </h3>
                            <div class="mt-1 flex items-center gap-1.5 text-[11px]">
                                <span class="text-zinc-500 dark:text-zinc-400 font-medium">전체 유저 상위</span>
                                <span class="text-[13px] font-black ${gradeInfo.color}">${percent.toFixed(1)}%</span>
                            </div>
                        </div>
                        <div class="text-5xl font-black ${gradeInfo.color} tracking-tighter">${gradeInfo.grade}</div>
                    </div>

                    <div class="relative z-10 bg-white dark:bg-[#1a1a1a] p-4 rounded-2xl border border-zinc-200 dark:border-white/5 shadow-sm dark:shadow-none">
                        <div class="flex items-center justify-between mb-3 gap-2">
                            <p class="text-[12px] font-bold ${gradeInfo.color} flex items-start gap-1.5 leading-snug">
                                <i data-lucide="check-circle-2" class="w-4 h-4 shrink-0 mt-0.5"></i> 
                                <span>${gradeInfo.label}</span>
                            </p>
                            ${state.isClassicMode ? `<span class="text-[9px] font-bold text-indigo-500 bg-indigo-50 dark:bg-indigo-500/10 px-1.5 py-0.5 rounded border border-indigo-500/20 shrink-0">클래식 소급됨</span>` : ''}
                        </div>

                        <!-- 🟢 1업당 성장량 표시 -->
                        <div class="text-[10.5px] font-medium text-zinc-500 dark:text-zinc-400 bg-zinc-100 dark:bg-[#222] border border-zinc-200 dark:border-zinc-700/50 rounded-lg px-2.5 py-1.5 mb-3 flex justify-between items-center">
                            <span>현재 스탯 기준 1업당 상승량</span>
                            <span class="font-mono font-bold text-zinc-700 dark:text-zinc-300">
                                ${growth.min}~${growth.max} <span class="text-zinc-400 dark:text-zinc-500 font-normal text-[9px]">(평균 ${Math.round(growth.avg * 10) / 10})</span>
                            </span>
                        </div>

                        <div class="relative w-full h-2.5 flex items-center mb-3">
                            <div class="h-full w-full bg-zinc-100 dark:bg-zinc-800 rounded-full overflow-hidden border border-zinc-200 dark:border-white/5">
                                <div class="${gradeInfo.bg} opacity-20 absolute inset-0"></div>
                                <div class="bar-transition ${gradeInfo.bg} absolute top-0 bottom-0 left-0" style="width: ${100 - percent}%"></div>
                            </div>
                            <div class="bar-transition absolute w-4 h-4 bg-white dark:bg-zinc-200 rounded-full shadow-md border-2 ${gradeInfo.border.replace('/50', '').replace('/30', '')} z-10 flex items-center justify-center" style="left: calc(${100 - percent}% - 8px)">
                                <div class="w-1.5 h-1.5 rounded-full ${gradeInfo.bg}"></div>
                            </div>
                        </div>
                        
                        <div class="flex justify-between text-xs font-mono text-zinc-500 dark:text-zinc-400 mt-2 px-1">
                            <span class="flex flex-col items-start font-medium">최악 <strong class="text-sm text-zinc-800 dark:text-zinc-200 mt-0.5">${min}</strong></span>
                            <span class="flex flex-col items-center font-medium">평균 <strong class="text-sm text-zinc-800 dark:text-zinc-200 mt-0.5">${Math.round(avg * 10)/10}</strong></span>
                            <span class="flex flex-col items-end font-medium">최고 <strong class="text-sm text-zinc-800 dark:text-zinc-200 mt-0.5">${max}</strong></span>
                        </div>
                    </div>
                </div>
            `;

            resultArea.innerHTML = `
                ${createCard('체력(HP)', 'heart', 'hp', hpPercent, hpGrade, minHp, avgHp, maxHp, 0, currentHpGrowth)}
                ${createCard('마나(MP)', 'droplets', 'mp', mpPercent, mpGrade, minMp, avgMp, maxMp, 1, currentMpGrowth)}
                <p class="animate-fade-in-up text-xs text-center text-zinc-400 dark:text-zinc-500 mt-2 font-medium flex items-center justify-center gap-1.5" style="animation-delay: 0.3s">
                    <i data-lucide="info" class="w-4 h-4"></i> 결과 마커가 우측(100%)에 가까울수록 축캐를 의미합니다.
                </p>
            `;
            
            renderIcons();
        }

        window.onload = () => {
            try {
                initApp();
            } catch (err) {
                console.warn('초기화 에러:', err);
            }
        };
    </script>
</body>
</html>
