<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>리니지 클래식 축/저주 판별기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: { sans: ["Inter", "sans-serif"], mono: ["ui-monospace", "monospace"] },
          },
        },
      };
    </script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap");
      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      input[type="number"] {
        -moz-appearance: textfield;
      }
      .bar-transition {
        transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #3f3f46;
      }
      .disabled-opacity {
        opacity: 0.3;
        pointer-events: none;
      }
      .toggle-dot {
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(15px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-fade-in-up {
        animation: fadeInUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        opacity: 0;
      }
    </style>
  </head>
  <body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 font-sans min-h-screen selection:bg-indigo-500/30 transition-colors duration-300">
    <div class="max-w-[1400px] mx-auto p-4 md:p-6 lg:py-8">
      <div class="flex items-center justify-between mb-6 md:mb-8">
        <h1 class="text-2xl md:text-3xl lg:text-4xl font-extrabold tracking-tight text-zinc-900 dark:text-zinc-100">축/저주 판별기</h1>
      </div>

      <div class="flex flex-col lg:flex-row gap-5 md:gap-6 items-stretch">
        <div class="w-full lg:w-1/2 xl:w-[48%] flex flex-col gap-6 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 shadow-xl shadow-zinc-200/50 dark:shadow-none rounded-3xl p-4 sm:p-6 md:p-8 relative h-full transition-colors duration-300">
          <div>
            <div class="flex items-center justify-between mb-3">
              <label class="flex items-center text-xs font-bold text-zinc-500 dark:text-zinc-400 tracking-wider uppercase"> <i data-lucide="crosshair" class="w-4 h-4 text-indigo-500 dark:text-indigo-400 mr-1.5"></i> 클래스 선택 </label>

              <label class="flex items-center gap-2 cursor-pointer group" onclick="toggleClassicModeEvent(event)">
                <span class="text-xs font-bold text-zinc-600 dark:text-zinc-300 group-hover:text-indigo-500 dark:group-hover:text-indigo-400 transition-colors">클래식 모드 (전체 소급)</span>
                <div class="relative w-10 h-5 bg-zinc-300 dark:bg-zinc-700 rounded-full transition-colors duration-300" id="classic-toggle-bg">
                  <div class="toggle-dot absolute left-1 top-1 bg-white w-3 h-3 rounded-full shadow-sm" id="classic-toggle-dot"></div>
                </div>
              </label>
            </div>
            <div class="grid grid-cols-4 gap-3" id="class-container"></div>
          </div>

          <div class="h-px w-full bg-zinc-100 dark:bg-zinc-800"></div>

          <div class="flex flex-row flex-wrap md:flex-nowrap gap-4 lg:gap-5 w-full">
            <div class="flex flex-col w-full md:w-[30%]">
              <label class="flex items-center justify-between text-xs font-bold text-zinc-500 dark:text-zinc-400 uppercase tracking-wide mb-2.5"> 현재 레벨 <span class="bg-indigo-50 dark:bg-indigo-500/10 text-indigo-600 dark:text-indigo-400 px-1.5 py-0.5 rounded text-[10px]">LV</span> </label>
              <div class="flex items-center gap-1.5 mb-2.5">
                <button
                  onclick="updateState('level', -1)"
                  class="w-8 h-8 flex-shrink-0 flex items-center justify-center rounded-lg bg-zinc-100 dark:bg-zinc-800 border border-transparent dark:border-zinc-700 hover:bg-zinc-200 dark:hover:bg-zinc-700 text-zinc-600 dark:text-zinc-300 transition-colors">
                  <i data-lucide="minus" class="w-3.5 h-3.5"></i>
                </button>
                <div class="flex-1 min-w-0 bg-white dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-lg shadow-inner flex items-center justify-center h-8 focus-within:border-indigo-500 focus-within:ring-1 focus-within:ring-indigo-500/30">
                  <input type="number" id="input-level" oninput="handleInput('level', this.value)" onblur="handleBlur('level')" class="w-full text-center bg-transparent font-bold text-base focus:outline-none dark:text-zinc-100 min-w-0" />
                </div>
                <button onclick="updateState('level', 1)" class="w-8 h-8 flex-shrink-0 flex items-center justify-center rounded-lg bg-zinc-100 dark:bg-zinc-800 border border-transparent dark:border-zinc-700 hover:bg-zinc-200 dark:hover:bg-zinc-700 text-zinc-600 dark:text-zinc-300 transition-colors">
                  <i data-lucide="plus" class="w-3.5 h-3.5"></i>
                </button>
              </div>
              <div class="mt-auto text-center bg-zinc-50 dark:bg-zinc-950 rounded-lg py-1 border border-zinc-100 dark:border-zinc-800">
                <span id="bonus-points-label" class="text-[10px] font-bold text-zinc-400 dark:text-zinc-500 truncate block px-1">51렙 개방</span>
              </div>
            </div>

            <div class="flex flex-col gap-2 w-[calc(50%-0.5rem)] md:w-[35%]">
              <label class="flex items-center justify-between text-xs font-bold text-zinc-500 dark:text-zinc-400 uppercase tracking-wide mb-1"> CON <span id="con-total-label" class="text-zinc-400 dark:text-zinc-500 text-[11px]">총 14</span> </label>
              <div class="flex items-center gap-1 w-full">
                <span class="text-[10px] font-bold text-zinc-400 w-8 md:w-9 flex-shrink-0 whitespace-nowrap text-right pr-0.5">베이스</span>
                <div class="flex-1 flex items-center gap-1 min-w-0">
                  <button
                    onclick="updateState('con', -1)"
                    class="w-8 h-8 flex-shrink-0 flex items-center justify-center rounded-lg bg-zinc-100 dark:bg-zinc-800 border border-transparent dark:border-zinc-700 hover:bg-zinc-200 dark:hover:bg-zinc-700 text-zinc-600 dark:text-zinc-300 transition-colors">
                    <i data-lucide="minus" class="w-3.5 h-3.5"></i>
                  </button>
                  <div class="flex-1 min-w-0 bg-white dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-lg shadow-inner flex items-center justify-center h-8">
                    <input type="number" id="input-con" oninput="handleInput('con', this.value)" onblur="handleBlur('con')" class="w-full text-center bg-transparent font-bold text-base focus:outline-none dark:text-zinc-100 min-w-0" />
                  </div>
                  <button onclick="updateState('con', 1)" class="w-8 h-8 flex-shrink-0 flex items-center justify-center rounded-lg bg-zinc-100 dark:bg-zinc-800 border border-transparent dark:border-zinc-700 hover:bg-zinc-200 dark:hover:bg-zinc-700 text-zinc-600 dark:text-zinc-300 transition-colors">
                    <i data-lucide="plus" class="w-3.5 h-3.5"></i>
                  </button>
                </div>
              </div>
              <div class="flex items-center gap-1 w-full transition-opacity duration-300 disabled-opacity" id="wrap-bonus-con">
                <span class="text-[10px] font-bold text-indigo-500 dark:text-indigo-400 w-8 md:w-9 flex-shrink-0 whitespace-nowrap text-right pr-0.5">+보너스</span>
                <div class="flex-1 flex items-center gap-1 min-w-0">
                  <button
                    onclick="updateState('bonusCon', -1)"
                    class="w-8 h-8 flex-shrink-0 flex items-center justify-center rounded-lg bg-indigo-50 dark:bg-indigo-500/10 border border-transparent dark:border-indigo-500/20 hover:bg-indigo-100 dark:hover:bg-indigo-500/20 text-indigo-600 dark:text-indigo-400 transition-colors">
                    <i data-lucide="minus" class="w-3.5 h-3.5"></i>
                  </button>
                  <div class="flex-1 min-w-0 bg-white dark:bg-zinc-950 border border-indigo-200 dark:border-indigo-500/30 rounded-lg shadow-inner flex items-center justify-center h-8">
                    <input type="number" id="input-bonusCon" oninput="handleInput('bonusCon', this.value)" onblur="handleBlur('bonusCon')" class="w-full text-center bg-transparent font-bold text-base text-indigo-600 dark:text-indigo-400 focus:outline-none min-w-0" />
                  </div>
                  <button
                    onclick="updateState('bonusCon', 1)"
                    class="w-8 h-8 flex-shrink-0 flex items-center justify-center rounded-lg bg-indigo-50 dark:bg-indigo-500/10 border border-transparent dark:border-indigo-500/20 hover:bg-indigo-100 dark:hover:bg-indigo-500/20 text-indigo-600 dark:text-indigo-400 transition-colors">
                    <i data-lucide="plus" class="w-3.5 h-3.5"></i>
                  </button>
                </div>
              </div>
            </div>

            <div class="flex flex-col gap-2 w-[calc(50%-0.5rem)] md:w-[35%]">
              <label class="flex items-center justify-between text-xs font-bold text-zinc-500 dark:text-zinc-400 uppercase tracking-wide mb-1"> WIS <span id="wis-total-label" class="text-zinc-400 dark:text-zinc-500 text-[11px]">총 9</span> </label>
              <div class="flex items-center gap-1 w-full">
                <span class="text-[10px] font-bold text-zinc-400 w-8 md:w-9 flex-shrink-0 whitespace-nowrap text-right pr-0.5">베이스</span>
                <div class="flex-1 flex items-center gap-1 min-w-0">
                  <button
                    onclick="updateState('wis', -1)"
                    class="w-8 h-8 flex-shrink-0 flex items-center justify-center rounded-lg bg-zinc-100 dark:bg-zinc-800 border border-transparent dark:border-zinc-700 hover:bg-zinc-200 dark:hover:bg-zinc-700 text-zinc-600 dark:text-zinc-300 transition-colors">
                    <i data-lucide="minus" class="w-3.5 h-3.5"></i>
                  </button>
                  <div class="flex-1 min-w-0 bg-white dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-lg shadow-inner flex items-center justify-center h-8">
                    <input type="number" id="input-wis" oninput="handleInput('wis', this.value)" onblur="handleBlur('wis')" class="w-full text-center bg-transparent font-bold text-base focus:outline-none dark:text-zinc-100 min-w-0" />
                  </div>
                  <button onclick="updateState('wis', 1)" class="w-8 h-8 flex-shrink-0 flex items-center justify-center rounded-lg bg-zinc-100 dark:bg-zinc-800 border border-transparent dark:border-zinc-700 hover:bg-zinc-200 dark:hover:bg-zinc-700 text-zinc-600 dark:text-zinc-300 transition-colors">
                    <i data-lucide="plus" class="w-3.5 h-3.5"></i>
                  </button>
                </div>
              </div>
              <div class="flex items-center gap-1 w-full transition-opacity duration-300 disabled-opacity" id="wrap-bonus-wis">
                <span class="text-[10px] font-bold text-indigo-500 dark:text-indigo-400 w-8 md:w-9 flex-shrink-0 whitespace-nowrap text-right pr-0.5">+보너스</span>
                <div class="flex-1 flex items-center gap-1 min-w-0">
                  <button
                    onclick="updateState('bonusWis', -1)"
                    class="w-8 h-8 flex-shrink-0 flex items-center justify-center rounded-lg bg-indigo-50 dark:bg-indigo-500/10 border border-transparent dark:border-indigo-500/20 hover:bg-indigo-100 dark:hover:bg-indigo-500/20 text-indigo-600 dark:text-indigo-400 transition-colors">
                    <i data-lucide="minus" class="w-3.5 h-3.5"></i>
                  </button>
                  <div class="flex-1 min-w-0 bg-white dark:bg-zinc-950 border border-indigo-200 dark:border-indigo-500/30 rounded-lg shadow-inner flex items-center justify-center h-8">
                    <input type="number" id="input-bonusWis" oninput="handleInput('bonusWis', this.value)" onblur="handleBlur('bonusWis')" class="w-full text-center bg-transparent font-bold text-base text-indigo-600 dark:text-indigo-400 focus:outline-none min-w-0" />
                  </div>
                  <button
                    onclick="updateState('bonusWis', 1)"
                    class="w-8 h-8 flex-shrink-0 flex items-center justify-center rounded-lg bg-indigo-50 dark:bg-indigo-500/10 border border-transparent dark:border-indigo-500/20 hover:bg-indigo-100 dark:hover:bg-indigo-500/20 text-indigo-600 dark:text-indigo-400 transition-colors">
                    <i data-lucide="plus" class="w-3.5 h-3.5"></i>
                  </button>
                </div>
              </div>
            </div>
          </div>

          <div class="h-px w-full bg-zinc-100 dark:bg-zinc-800"></div>

          <div class="flex flex-col gap-4 flex-1 justify-center">
            <div class="bg-zinc-50 dark:bg-zinc-950/50 border border-zinc-200 dark:border-zinc-800 rounded-3xl p-4 sm:p-5 md:p-6 flex flex-col gap-4 transition-colors hover:border-red-400 dark:hover:border-red-500/60 shadow-sm">
              <div class="flex justify-between items-end">
                <label class="text-base font-extrabold text-zinc-800 dark:text-zinc-100 flex items-center gap-2"> <i data-lucide="heart" class="w-5 h-5 text-red-500"></i> 순수 HP </label>
                <span id="expected-hp-label" class="text-xs font-mono font-bold text-zinc-500 dark:text-zinc-400"></span>
              </div>
              <div class="flex items-center justify-between gap-1 sm:gap-2 w-full">
                <button
                  onclick="updateState('hp', -10)"
                  class="w-9 h-9 sm:w-11 sm:h-11 md:w-12 md:h-12 flex-shrink-0 flex items-center justify-center rounded-xl bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 hover:bg-red-50 dark:hover:bg-red-500/10 text-red-500 dark:text-red-400 transition-all font-mono text-[10px] sm:text-xs font-bold shadow-sm dark:shadow-none">
                  -10
                </button>
                <button
                  onclick="updateState('hp', -1)"
                  class="w-9 h-9 sm:w-11 sm:h-11 md:w-12 md:h-12 flex-shrink-0 flex items-center justify-center rounded-xl bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 hover:bg-red-50 dark:hover:bg-red-500/10 text-red-500 dark:text-red-400 transition-all shadow-sm dark:shadow-none">
                  <i data-lucide="minus" class="w-4 h-4 sm:w-5 sm:h-5"></i>
                </button>

                <div class="flex-1 min-w-0 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-inner flex items-center justify-center h-9 sm:h-11 md:h-12 focus-within:border-red-500 focus-within:ring-1 focus-within:ring-red-500/30">
                  <input type="number" id="input-hp" oninput="handleInput('hp', this.value)" onblur="handleBlur('hp')" min="0" class="w-full text-center bg-transparent font-black text-xl sm:text-2xl md:text-3xl text-red-600 dark:text-red-500 focus:outline-none min-w-0" />
                </div>

                <button
                  onclick="updateState('hp', 1)"
                  class="w-9 h-9 sm:w-11 sm:h-11 md:w-12 md:h-12 flex-shrink-0 flex items-center justify-center rounded-xl bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 hover:bg-red-50 dark:hover:bg-red-500/10 text-red-500 dark:text-red-400 transition-all shadow-sm dark:shadow-none">
                  <i data-lucide="plus" class="w-4 h-4 sm:w-5 sm:h-5"></i>
                </button>
                <button
                  onclick="updateState('hp', 10)"
                  class="w-9 h-9 sm:w-11 sm:h-11 md:w-12 md:h-12 flex-shrink-0 flex items-center justify-center rounded-xl bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 hover:bg-red-50 dark:hover:bg-red-500/10 text-red-500 dark:text-red-400 transition-all font-mono text-[10px] sm:text-xs font-bold shadow-sm dark:shadow-none">
                  +10
                </button>
              </div>
            </div>

            <div class="bg-zinc-50 dark:bg-zinc-950/50 border border-zinc-200 dark:border-zinc-800 rounded-3xl p-4 sm:p-5 md:p-6 flex flex-col gap-4 transition-colors hover:border-blue-400 dark:hover:border-blue-500/60 shadow-sm">
              <div class="flex justify-between items-end">
                <label class="text-base font-extrabold text-zinc-800 dark:text-zinc-100 flex items-center gap-2"> <i data-lucide="droplets" class="w-5 h-5 text-blue-500"></i> 순수 MP </label>
                <span id="expected-mp-label" class="text-xs font-mono font-bold text-zinc-500 dark:text-zinc-400"></span>
              </div>
              <div class="flex items-center justify-between gap-1 sm:gap-2 w-full">
                <button
                  onclick="updateState('mp', -10)"
                  class="w-9 h-9 sm:w-11 sm:h-11 md:w-12 md:h-12 flex-shrink-0 flex items-center justify-center rounded-xl bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 hover:bg-blue-50 dark:hover:bg-blue-500/10 text-blue-500 dark:text-blue-400 transition-all font-mono text-[10px] sm:text-xs font-bold shadow-sm dark:shadow-none">
                  -10
                </button>
                <button
                  onclick="updateState('mp', -1)"
                  class="w-9 h-9 sm:w-11 sm:h-11 md:w-12 md:h-12 flex-shrink-0 flex items-center justify-center rounded-xl bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 hover:bg-blue-50 dark:hover:bg-blue-500/10 text-blue-500 dark:text-blue-400 transition-all shadow-sm dark:shadow-none">
                  <i data-lucide="minus" class="w-4 h-4 sm:w-5 sm:h-5"></i>
                </button>

                <div class="flex-1 min-w-0 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-inner flex items-center justify-center h-9 sm:h-11 md:h-12 focus-within:border-blue-500 focus-within:ring-1 focus-within:ring-blue-500/30">
                  <input type="number" id="input-mp" oninput="handleInput('mp', this.value)" onblur="handleBlur('mp')" class="w-full text-center bg-transparent font-black text-xl sm:text-2xl md:text-3xl text-blue-600 dark:text-blue-500 focus:outline-none min-w-0" />
                </div>

                <button
                  onclick="updateState('mp', 1)"
                  class="w-9 h-9 sm:w-11 sm:h-11 md:w-12 md:h-12 flex-shrink-0 flex items-center justify-center rounded-xl bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 hover:bg-blue-50 dark:hover:bg-blue-500/10 text-blue-500 dark:text-blue-400 transition-all shadow-sm dark:shadow-none">
                  <i data-lucide="plus" class="w-4 h-4 sm:w-5 sm:h-5"></i>
                </button>
                <button
                  onclick="updateState('mp', 10)"
                  class="w-9 h-9 sm:w-11 sm:h-11 md:w-12 md:h-12 flex-shrink-0 flex items-center justify-center rounded-xl bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 hover:bg-blue-50 dark:hover:bg-blue-500/10 text-blue-500 dark:text-blue-400 transition-all font-mono text-[10px] sm:text-xs font-bold shadow-sm dark:shadow-none">
                  +10
                </button>
              </div>
            </div>
          </div>
        </div>

        <div class="w-full lg:w-1/2 xl:w-[52%] flex flex-col h-full bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 shadow-xl shadow-zinc-200/50 dark:shadow-none rounded-3xl p-4 sm:p-6 md:p-8 transition-colors duration-300">
          <div id="result-container" class="flex-1 flex flex-col gap-4 h-full">
            <div>
              <div class="flex items-center justify-between mb-3">
                <h3 class="text-xs font-bold text-zinc-500 dark:text-zinc-400 tracking-wider uppercase flex items-center gap-1.5"><i data-lucide="bar-chart-2" class="w-4 h-4"></i> 판정 기준표</h3>
              </div>
              <div class="grid grid-cols-5 gap-2 text-center">
                <div class="flex flex-col gap-1 p-2 md:p-2.5 rounded-xl bg-amber-50 dark:bg-amber-500/10 border border-amber-200 dark:border-amber-500/20">
                  <span class="font-black text-amber-500 dark:text-amber-400 text-lg md:text-xl">S</span><span class="text-zinc-500 dark:text-amber-400/80 font-mono text-[10px] md:text-[11px] font-bold">0~10%</span>
                </div>
                <div class="flex flex-col gap-1 p-2 md:p-2.5 rounded-xl bg-fuchsia-50 dark:bg-fuchsia-500/10 border border-fuchsia-200 dark:border-fuchsia-500/20">
                  <span class="font-black text-fuchsia-500 dark:text-fuchsia-400 text-lg md:text-xl">A</span><span class="text-zinc-500 dark:text-fuchsia-400/80 font-mono text-[10px] md:text-[11px] font-bold">11~25%</span>
                </div>
                <div class="flex flex-col gap-1 p-2 md:p-2.5 rounded-xl bg-emerald-50 dark:bg-emerald-500/10 border border-emerald-200 dark:border-emerald-500/20">
                  <span class="font-black text-emerald-500 dark:text-emerald-400 text-lg md:text-xl">B</span><span class="text-zinc-500 dark:text-emerald-400/80 font-mono text-[10px] md:text-[11px] font-bold">26~70%</span>
                </div>
                <div class="flex flex-col gap-1 p-2 md:p-2.5 rounded-xl bg-orange-50 dark:bg-orange-500/10 border border-orange-200 dark:border-orange-500/20">
                  <span class="font-black text-orange-500 dark:text-orange-400 text-lg md:text-xl">C</span><span class="text-zinc-500 dark:text-orange-400/80 font-mono text-[10px] md:text-[11px] font-bold">71~90%</span>
                </div>
                <div class="flex flex-col gap-1 p-2 md:p-2.5 rounded-xl bg-red-50 dark:bg-red-500/10 border border-red-200 dark:border-red-500/20">
                  <span class="font-black text-red-500 dark:text-red-400 text-lg md:text-xl">F</span><span class="text-zinc-500 dark:text-red-400/80 font-mono text-[10px] md:text-[11px] font-bold">91~100%</span>
                </div>
              </div>
            </div>

            <div id="waiting-area" class="flex-1 flex flex-col items-center justify-center bg-zinc-50 dark:bg-transparent rounded-3xl p-8 text-center border border-dashed border-zinc-300 dark:border-zinc-800">
              <div class="w-16 h-16 bg-white dark:bg-zinc-800 rounded-2xl flex items-center justify-center mb-5 border border-zinc-200 dark:border-zinc-700 shadow-sm">
                <i data-lucide="pie-chart" class="w-8 h-8 text-zinc-400 dark:text-zinc-500"></i>
              </div>
              <h3 class="text-lg font-bold text-zinc-800 dark:text-zinc-200 mb-2">분석 대기중</h3>
              <p class="text-sm text-zinc-500 dark:text-zinc-500 leading-relaxed">좌측 패널에서 레벨 2 이상의 스탯을 입력하시면<br />축/저주 판별 결과가 실시간으로 분석됩니다.</p>
            </div>

            <div id="result-area" class="hidden flex-col justify-center gap-4 w-full flex-1"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      window.addEventListener("message", (event) => {
        if (event.data.type === "THEME_CHANGE") {
          const html = document.documentElement;
          if (event.data.isDark) {
            html.classList.add("dark");
            state.isDarkMode = true;
          } else {
            html.classList.remove("dark");
            state.isDarkMode = false;
          }
        }
      });

      let iconRetryCount = 0;
      function renderIcons() {
        try {
          if (window.lucide && window.lucide.createIcons) window.lucide.createIcons();
          else if (iconRetryCount < 20) {
            iconRetryCount++;
            setTimeout(renderIcons, 50);
          }
        } catch (e) {}
      }

      const CLASS_INFO = {
        knight: { id: "knight", name: "기사", icon: "sword", baseCon: 14, baseWis: 9, baseHp: 16, baseMp: 1 },
        elf: { id: "elf", name: "요정", icon: "crosshair", baseCon: 12, baseWis: 12, baseHp: 15, baseMp: 4 },
        wizard: { id: "wizard", name: "마법사", icon: "wand-2", baseCon: 12, baseWis: 12, baseHp: 12, baseMp: 6 },
        royal: { id: "royal", name: "군주", icon: "crown", baseCon: 10, baseWis: 11, baseHp: 14, baseMp: 2 },
      };

      let state = { charClass: "knight", level: 1, con: 14, wis: 9, bonusCon: 0, bonusWis: 0, hp: 16, mp: 1, isDarkMode: true, isClassicMode: true, isHpModifiedByUser: false, isMpModifiedByUser: false };

      function saveState() {
        try {
          if (typeof window.localStorage !== "undefined") localStorage.setItem("lineageCalculatorState", JSON.stringify(state));
        } catch (e) {}
      }

      function loadState() {
        try {
          if (typeof window.localStorage !== "undefined") {
            const savedState = localStorage.getItem("lineageCalculatorState");
            if (savedState) {
              const parsed = JSON.parse(savedState);
              state = { ...state, ...parsed };
              if (typeof state.bonusCon !== "number") state.bonusCon = 0;
              if (typeof state.bonusWis !== "number") state.bonusWis = 0;
              if (typeof state.isClassicMode !== "boolean") state.isClassicMode = true;
              updateClassicToggleUI();
              return true;
            }
          }
        } catch (e) {}
        return false;
      }

      function toggleClassicModeEvent(e) {
        e.preventDefault();
        state.isClassicMode = !state.isClassicMode;
        updateClassicToggleUI();
        if (!state.isHpModifiedByUser) {
          const effectiveCon = state.isClassicMode ? state.con + state.bonusCon : state.con;
          state.hp = getBaseHp(state.charClass, effectiveCon);
        }
        syncInputs();
        renderExpectedLabels();
        calculateResult();
        saveState();
      }

      function updateClassicToggleUI() {
        const bg = document.getElementById("classic-toggle-bg");
        const dot = document.getElementById("classic-toggle-dot");
        if (!bg || !dot) return;
        if (state.isClassicMode) {
          bg.classList.remove("bg-zinc-300", "dark:bg-zinc-700");
          bg.classList.add("bg-indigo-500");
          dot.style.transform = "translateX(1.25rem)";
        } else {
          bg.classList.remove("bg-indigo-500");
          bg.classList.add("bg-zinc-300", "dark:bg-zinc-700");
          dot.style.transform = "translateX(0)";
        }
      }

      function initApp() {
        loadState();
        updateClassicToggleUI();
        renderClassSelector();
        if (state.charClass) {
          Object.keys(CLASS_INFO).forEach((id) => {
            const btn = document.getElementById(`btn-cls-${id}`);
            if (btn) {
              if (id === state.charClass) btn.classList.add("border-indigo-500", "bg-indigo-50", "dark:bg-indigo-500/10", "text-indigo-600", "dark:text-indigo-400");
              else btn.classList.remove("border-indigo-500", "bg-indigo-50", "dark:bg-indigo-500/10", "text-indigo-600", "dark:text-indigo-400");
            }
          });
          syncInputs();
          renderExpectedLabels();
          calculateResult();
        } else {
          setCharClass("knight", true);
        }
        renderIcons();
        window.parent.postMessage({ type: "REQUEST_THEME" }, "*");
      }

      function renderClassSelector() {
        const container = document.getElementById("class-container");
        container.innerHTML = Object.values(CLASS_INFO)
          .map(
            (cls) => `
                <button onclick="setCharClass('${cls.id}')" id="btn-cls-${cls.id}" class="flex flex-col items-center justify-center py-3 md:py-3.5 px-2 rounded-2xl border border-zinc-200 dark:border-zinc-800 bg-zinc-50 dark:bg-zinc-950/50 text-zinc-500 dark:text-zinc-400 hover:border-indigo-300 dark:hover:border-indigo-500/50 hover:text-indigo-500 dark:hover:text-indigo-400 transition-all font-medium">
                    <i data-lucide="${cls.icon}" class="w-5 h-5 mb-1.5"></i>
                    <span class="text-xs tracking-wide">${cls.name}</span>
                </button>
            `,
          )
          .join("");
        renderIcons();
      }

      function setCharClass(classId, isInit = false) {
        state.charClass = classId;
        state.con = CLASS_INFO[classId].baseCon;
        state.wis = CLASS_INFO[classId].baseWis;
        state.bonusCon = 0;
        state.bonusWis = 0;
        const effectiveCon = state.isClassicMode ? state.con + state.bonusCon : state.con;

        if (isInit) {
          state.hp = getBaseHp(classId, effectiveCon);
          state.mp = CLASS_INFO[classId].baseMp;
        } else {
          if (!state.isHpModifiedByUser) state.hp = getBaseHp(classId, effectiveCon);
          if (!state.isMpModifiedByUser) state.mp = CLASS_INFO[classId].baseMp;
        }

        Object.keys(CLASS_INFO).forEach((id) => {
          const btn = document.getElementById(`btn-cls-${id}`);
          if (!btn) return;
          btn.classList.remove("border-indigo-500", "bg-indigo-50", "dark:bg-indigo-500/10", "text-indigo-600", "dark:text-indigo-400");
          btn.classList.add("border-zinc-200", "dark:border-zinc-800", "bg-zinc-50", "dark:bg-zinc-950/50", "text-zinc-500", "dark:text-zinc-400");
          if (id === classId) {
            btn.classList.remove("border-zinc-200", "dark:border-zinc-800", "bg-zinc-50", "dark:bg-zinc-950/50", "text-zinc-500", "dark:text-zinc-400");
            btn.classList.add("border-indigo-500", "bg-indigo-50", "dark:bg-indigo-500/10", "text-indigo-600", "dark:text-indigo-400");
          }
        });
        syncInputs();
        renderExpectedLabels();
        calculateResult();
        saveState();
      }

      function handleInput(key, value) {
        let cleanVal = value.replace(/[^0-9]/g, "");
        if (key === "hp" || key === "mp") {
          state[key === "hp" ? "isHpModifiedByUser" : "isMpModifiedByUser"] = true;
          if (cleanVal.length > 4) cleanVal = cleanVal.slice(0, 4);
        } else if (key === "level") {
          if (parseInt(cleanVal, 10) > 99) cleanVal = "99";
        }
        const inputEl = document.getElementById(`input-${key}`);
        if (inputEl) inputEl.value = cleanVal;
        if (cleanVal === "") state[key] = 0;
        else state[key] = parseInt(cleanVal, 10) || 0;
        renderExpectedLabels();
        calculateResult();
        saveState();
      }

      function handleBlur(key) {
        if (key === "level") {
          const lvlInput = document.getElementById("input-level");
          if (lvlInput && lvlInput.value === "") state.level = 1;
          state.level = Math.max(1, Math.min(99, state.level));
        }
        if (key === "con") {
          const conInput = document.getElementById("input-con");
          if (conInput && conInput.value === "") state.con = CLASS_INFO[state.charClass].baseCon;
          state.con = Math.max(CLASS_INFO[state.charClass].baseCon, Math.min(18, state.con));
        }
        if (key === "wis") {
          const wisInput = document.getElementById("input-wis");
          if (wisInput && wisInput.value === "") state.wis = CLASS_INFO[state.charClass].baseWis;
          state.wis = Math.max(CLASS_INFO[state.charClass].baseWis, Math.min(18, state.wis));
        }
        let maxBonus = Math.max(0, state.level - 50);
        let conRoom = Math.max(0, 25 - state.con);
        let availableForCon = Math.max(0, maxBonus - state.bonusWis);
        state.bonusCon = Math.max(0, Math.min(conRoom, Math.min(availableForCon, state.bonusCon || 0)));
        let wisRoom = Math.max(0, 25 - state.wis);
        let availableForWis = Math.max(0, maxBonus - state.bonusCon);
        state.bonusWis = Math.max(0, Math.min(wisRoom, Math.min(availableForWis, state.bonusWis || 0)));

        if (key === "hp") {
          const hpInput = document.getElementById("input-hp");
          if (hpInput && hpInput.value === "") {
            const effectiveCon = state.isClassicMode ? state.con + state.bonusCon : state.con;
            state.hp = getBaseHp(state.charClass, effectiveCon);
            state.isHpModifiedByUser = false;
          } else state.hp = Math.max(1, state.hp);
        }
        if (key === "mp") {
          const mpInput = document.getElementById("input-mp");
          if (mpInput && mpInput.value === "") {
            state.mp = CLASS_INFO[state.charClass].baseMp;
            state.isMpModifiedByUser = false;
          } else state.mp = Math.max(0, state.mp);
        }
        syncInputs();
        renderExpectedLabels();
        calculateResult();
        saveState();
      }

      function updateState(key, delta) {
        if (key === "hp") state.isHpModifiedByUser = true;
        if (key === "mp") state.isMpModifiedByUser = true;
        state[key] += delta;
        handleBlur(key);
      }

      function syncInputs() {
        ["level", "con", "wis", "bonusCon", "bonusWis", "hp", "mp"].forEach((k) => {
          const el = document.getElementById(`input-${k}`);
          if (el) el.value = state[k];
        });
      }

      function renderExpectedLabels() {
        let maxBonus = Math.max(0, state.level - 50);
        let remainBonus = maxBonus - (state.bonusCon + state.bonusWis);
        const wrapCon = document.getElementById("wrap-bonus-con");
        const wrapWis = document.getElementById("wrap-bonus-wis");
        const bonusLabel = document.getElementById("bonus-points-label");

        if (state.level > 50) {
          if (wrapCon) wrapCon.classList.remove("disabled-opacity");
          if (wrapWis) wrapWis.classList.remove("disabled-opacity");
          if (bonusLabel) {
            bonusLabel.innerText = `잔여 보너스: ${remainBonus}pt`;
            bonusLabel.classList.replace("text-zinc-400", "text-indigo-600");
            bonusLabel.classList.replace("dark:text-zinc-500", "dark:text-indigo-400");
          }
        } else {
          if (wrapCon) wrapCon.classList.add("disabled-opacity");
          if (wrapWis) wrapWis.classList.add("disabled-opacity");
          if (bonusLabel) {
            bonusLabel.innerText = `51렙부터 개방`;
            bonusLabel.classList.replace("text-indigo-600", "text-zinc-400");
            bonusLabel.classList.replace("dark:text-indigo-400", "dark:text-zinc-500");
          }
        }

        const totalCon = state.con + state.bonusCon;
        const totalWis = state.wis + state.bonusWis;

        const conTotalLabel = document.getElementById("con-total-label");
        const wisTotalLabel = document.getElementById("wis-total-label");

        if (conTotalLabel) {
          conTotalLabel.innerText = `총 ${totalCon}`;
          if (totalCon > state.con) {
            conTotalLabel.classList.replace("text-zinc-400", "text-indigo-500");
            conTotalLabel.classList.replace("dark:text-zinc-500", "dark:text-indigo-400");
          } else {
            conTotalLabel.classList.replace("text-indigo-500", "text-zinc-400");
            conTotalLabel.classList.replace("dark:text-indigo-400", "dark:text-zinc-500");
          }
        }
        if (wisTotalLabel) {
          wisTotalLabel.innerText = `총 ${totalWis}`;
          if (totalWis > state.wis) {
            wisTotalLabel.classList.replace("text-zinc-400", "text-indigo-500");
            wisTotalLabel.classList.replace("dark:text-zinc-500", "dark:text-indigo-400");
          } else {
            wisTotalLabel.classList.replace("text-indigo-500", "text-zinc-400");
            wisTotalLabel.classList.replace("dark:text-indigo-400", "dark:text-zinc-500");
          }
        }

        const baseConForLabel = state.isClassicMode ? totalCon : state.con;
        const baseHp = getBaseHp(state.charClass, baseConForLabel);
        const levelUps = Math.max(1, state.level - 1);
        const gainedHp = state.hp - baseHp;
        const avgHpPerLevel = state.level > 1 ? (gainedHp / levelUps).toFixed(1) : "0.0";

        const expHpEl = document.getElementById("expected-hp-label");
        if (expHpEl) expHpEl.innerText = `${baseHp} + ${Math.max(0, gainedHp)} (${avgHpPerLevel})`;

        const baseMp = CLASS_INFO[state.charClass].baseMp;
        const gainedMp = state.mp - baseMp;
        const avgMpPerLevel = state.level > 1 ? (gainedMp / levelUps).toFixed(1) : "0.0";
        const expMpEl = document.getElementById("expected-mp-label");
        if (expMpEl) expMpEl.innerText = `${baseMp} + ${Math.max(0, gainedMp)} (${avgMpPerLevel})`;
      }

      function getBaseHp(classId, con) {
        const base = CLASS_INFO[classId].baseHp;
        const threshold = 15;
        return con <= threshold ? base : base + (con - threshold);
      }
      function getHpGrowth(classId, con) {
        // 각 클래스별 [기본 최소치, 기본 최대치] (CON 15 이하 기준)
        const growthData = {
          knight: [6, 12],
          elf: [5, 10],
          wizard: [3, 6],
          royal: [5, 10],
        };

        if (!growthData[classId]) return { min: 0, max: 0, avg: 0 };

        const [baseMin, baseMax] = growthData[classId];

        // CON 15 이하는 보너스 0, 16부터는 상한선(Cap) 없이 CON 1당 무한 증가
        const bonus = Math.max(0, con - 15);

        const finalMin = baseMin + bonus;
        const finalMax = baseMax + bonus;

        return {
          min: finalMin,
          max: finalMax,
          avg: (finalMin + finalMax) / 2,
        };
      }

      function getMpGrowth(classId, wis) {
        switch (classId) {
          case "knight":
            // 기사: WIS 9 이하는 고정, 10 이상부터 5단위(13, 18, 23...)로 최소치 증가, 최대치는 항상 최소치+3
            if (wis <= 9) return { min: 0, max: 2, avg: 1 };
            const kWis = Math.max(10, wis);
            const kMin = Math.floor((kWis - 8) / 5);
            return { min: kMin, max: kMin + 3, avg: kMin + 1.5 };

          case "elf":
            // 요정: WIS 11 이하는 고정, 12부터 5단위마다 2씩 상승하는 계단식 패턴 적용
            if (wis <= 11) return { min: 3, max: 4, avg: 3.5 };
            const eMin = Math.floor((wis * 2 - 9) / 5);
            const eMax = Math.floor((wis * 2) / 5) + 2;
            return { min: eMin, max: eMax, avg: (eMin + eMax) / 2 };

          case "wizard":
            // 마법사: WIS 2 오를 때마다 정확히 최소/최대치가 1씩 규칙적으로 상승
            const wWis = Math.max(12, wis);
            const wMin = Math.floor((wWis - 3) / 2);
            const wMax = Math.floor(wWis / 2) + 3;
            return { min: wMin, max: wMax, avg: (wMin + wMax) / 2 };

          case "royal":
            // 군주: WIS 11 이하는 고정, 이후 4주기 패턴으로 교차 상승
            const rWis = Math.max(11, wis);
            const rMin = Math.floor((rWis + 1) / 4) - 1;
            const rMax = Math.floor(rWis / 4) + 2;
            return { min: rMin, max: rMax, avg: (rMin + rMax) / 2 };

          default:
            return { min: 0, max: 0, avg: 0 };
        }
      }

      function getGrade(topPercent) {
        const messages = {
          S: ["완벽한 난수 분배! 서버 1티어 유전자입니다.", "더 이상 스탯 스트레스는 없습니다. 축캐 그 자체!", "축하합니다. 레벨업만으로도 상위 랭커의 자질을 갖추셨습니다.", "엔씨의 확률을 뚫어낸 기적의 캐릭터입니다."],
          A: ["매우 훌륭한 성장 곡선. 든든한 1인분이 가능합니다.", "전투와 쟁에서 절대 밀리지 않는 우월한 스탯입니다.", "상위권 도약이 충분히 가능한 훌륭한 축캐입니다.", "이 정도면 장비 세팅에 투자할 가치가 충분합니다!"],
          B: ["가장 안정적인 국민 스탯. 부족함은 장비로 극복!", "무난하게 키우기 좋은 든든한 국밥 같은 캐릭터입니다.", "스트레스 없이 사냥하기 좋은 평범한 스탯입니다.", "과하지도 부족하지도 않은 완벽한 밸런스형입니다."],
          C: ["다소 아쉬운 스탯. HP/MP 틱 보정 장비에 투자가 필요합니다.", "애정으로 극복할 수 있는 마지노선입니다.", "레벨업과 장비 세팅으로 스탯의 빈자리를 채워주세요.", "전투보다는 사냥 위주의 플레이를 권장드립니다."],
          F: ["가혹한 확률의 희생양. 진지하게 삭제 후 재육성을 권장합니다.", "이 캐릭터에 더 이상의 투자는 매몰 비용일 뿐입니다.", "엔씨의 서버가 당신을 억까하고 있습니다. 새 출발을 하세요.", "심해의 저주캐... 당장 리세마라를 시작하십시오."],
        };
        const getRandomMsg = (grade) => messages[grade][Math.floor(Math.random() * messages[grade].length)];
        if (topPercent <= 10) return { grade: "S", color: "text-amber-500 dark:text-amber-400", bg: "bg-amber-400 dark:bg-amber-400", border: "border-amber-400/50 dark:border-amber-400/30", label: getRandomMsg("S") };
        if (topPercent <= 25) return { grade: "A", color: "text-fuchsia-500 dark:text-fuchsia-400", bg: "bg-fuchsia-400 dark:bg-fuchsia-400", border: "border-fuchsia-400/50 dark:border-fuchsia-400/30", label: getRandomMsg("A") };
        if (topPercent <= 70) return { grade: "B", color: "text-emerald-500 dark:text-emerald-400", bg: "bg-emerald-400 dark:bg-emerald-400", border: "border-emerald-400/50 dark:border-emerald-400/30", label: getRandomMsg("B") };
        if (topPercent <= 90) return { grade: "C", color: "text-orange-500 dark:text-orange-400", bg: "bg-orange-400 dark:bg-orange-400", border: "border-orange-400/50 dark:border-orange-400/30", label: getRandomMsg("C") };
        return { grade: "F", color: "text-red-500 dark:text-red-400", bg: "bg-red-500 dark:bg-red-500", border: "border-red-500/50 dark:border-red-500/30", label: getRandomMsg("F") };
      }

      function calculateResult() {
        const waitingArea = document.getElementById("waiting-area");
        const resultArea = document.getElementById("result-area");
        if (!waitingArea || !resultArea) return;

        if (state.level < 2) {
          waitingArea.classList.remove("hidden");
          waitingArea.classList.add("flex");
          resultArea.classList.add("hidden");
          resultArea.classList.remove("flex");
          return;
        }

        waitingArea.classList.add("hidden");
        waitingArea.classList.remove("flex");
        resultArea.classList.remove("hidden");
        resultArea.classList.add("flex");

        let minHp, maxHp, avgHp, minMp, maxMp, avgMp;
        const totalCon = state.con + state.bonusCon;
        const totalWis = state.wis + state.bonusWis;
        const currentHpGrowth = getHpGrowth(state.charClass, totalCon);
        const currentMpGrowth = getMpGrowth(state.charClass, totalWis);

        if (state.isClassicMode) {
          const baseHpClassic = getBaseHp(state.charClass, totalCon);
          const baseMpClassic = CLASS_INFO[state.charClass].baseMp;
          minHp = maxHp = avgHp = baseHpClassic;
          minMp = maxMp = avgMp = baseMpClassic;
          const hpGrowth = getHpGrowth(state.charClass, totalCon);
          const mpGrowth = getMpGrowth(state.charClass, totalWis);
          for (let lvl = 2; lvl <= state.level; lvl++) {
            minHp += hpGrowth.min;
            maxHp += hpGrowth.max;
            avgHp += hpGrowth.avg;
            minMp += mpGrowth.min;
            maxMp += mpGrowth.max;
            avgMp += mpGrowth.avg;
          }
        } else {
          minHp = maxHp = avgHp = getBaseHp(state.charClass, state.con);
          minMp = maxMp = avgMp = CLASS_INFO[state.charClass].baseMp;
          let activeBonusCon = 0,
            activeBonusWis = 0;
          for (let lvl = 2; lvl <= state.level; lvl++) {
            if (lvl > 50) {
              if (activeBonusCon < state.bonusCon) activeBonusCon++;
              else if (activeBonusWis < state.bonusWis) activeBonusWis++;
            }
            let hpGrowth = getHpGrowth(state.charClass, state.con + activeBonusCon);
            minHp += hpGrowth.min;
            maxHp += hpGrowth.max;
            avgHp += hpGrowth.avg;
            let mpGrowth = getMpGrowth(state.charClass, state.wis + activeBonusWis);
            minMp += mpGrowth.min;
            maxMp += mpGrowth.max;
            avgMp += mpGrowth.avg;
          }
        }

        let hpPercent = maxHp !== minHp ? ((maxHp - state.hp) / (maxHp - minHp)) * 100 : 100;
        hpPercent = Math.max(0, Math.min(100, hpPercent));
        const hpGrade = getGrade(hpPercent);

        let mpPercent = maxMp !== minMp ? ((maxMp - state.mp) / (maxMp - minMp)) * 100 : 100;
        mpPercent = Math.max(0, Math.min(100, mpPercent));
        const mpGrade = getGrade(mpPercent);

        const createCard = (title, icon, type, percent, gradeInfo, min, avg, max, delayIdx, growth) => `
                <div class="animate-fade-in-up border ${gradeInfo.border} rounded-3xl p-5 relative overflow-hidden flex-1 flex flex-col justify-center bg-white dark:bg-zinc-900/50" style="animation-delay: ${delayIdx * 0.15}s">
                    <div class="absolute -right-2 -top-2 opacity-5 pointer-events-none">
                        <i data-lucide="${icon}" class="w-32 h-32 text-zinc-900 dark:text-white"></i>
                    </div>
                    <div class="flex items-center justify-between mb-4 relative z-10">
                        <div>
                            <h3 class="text-lg font-extrabold flex items-center gap-1.5 ${type === "hp" ? "text-red-500 dark:text-red-400" : "text-blue-500 dark:text-blue-400"}">
                                <i data-lucide="${icon}" class="w-5 h-5"></i> ${title} 분석
                            </h3>
                            <div class="mt-1 flex items-center gap-1.5 text-[11px]">
                                <span class="text-zinc-500 dark:text-zinc-400 font-medium">전체 유저 상위</span>
                                <span class="text-[13px] font-black ${gradeInfo.color}">${percent.toFixed(1)}%</span>
                            </div>
                        </div>
                        <div class="text-5xl font-black ${gradeInfo.color} tracking-tighter">${gradeInfo.grade}</div>
                    </div>
                    <div class="relative z-10 bg-zinc-50 dark:bg-zinc-950 p-4 rounded-2xl border border-zinc-200 dark:border-zinc-800 shadow-sm dark:shadow-none">
                        <div class="flex items-center justify-between mb-3 gap-2">
                            <p class="text-[12px] font-bold ${gradeInfo.color} flex items-start gap-1.5 leading-snug">
                                <i data-lucide="check-circle-2" class="w-4 h-4 shrink-0 mt-0.5"></i> 
                                <span>${gradeInfo.label}</span>
                            </p>
                            ${state.isClassicMode ? `<span class="text-[9px] font-bold text-indigo-500 bg-indigo-50 dark:bg-indigo-500/10 px-1.5 py-0.5 rounded border border-indigo-500/20 shrink-0">클래식 소급됨</span>` : ""}
                        </div>
                        <div class="text-[10.5px] font-medium text-zinc-500 dark:text-zinc-400 bg-zinc-100 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-lg px-2.5 py-1.5 mb-3 flex justify-between items-center">
                            <span>현재 스탯 기준 1업당 상승량</span>
                            <span class="font-mono font-bold text-zinc-700 dark:text-zinc-300">
                                ${growth.min}~${growth.max} <span class="text-zinc-400 dark:text-zinc-500 font-normal text-[9px]">(평균 ${Math.round(growth.avg * 10) / 10})</span>
                            </span>
                        </div>
                        <div class="relative w-full h-2.5 flex items-center mb-3">
                            <div class="h-full w-full bg-zinc-200 dark:bg-zinc-800 rounded-full overflow-hidden border border-zinc-300 dark:border-zinc-700">
                                <div class="${gradeInfo.bg} opacity-20 absolute inset-0"></div>
                                <div class="bar-transition ${gradeInfo.bg} absolute top-0 bottom-0 left-0" style="width: ${100 - percent}%"></div>
                            </div>
                            <div class="bar-transition absolute w-4 h-4 bg-white dark:bg-zinc-200 rounded-full shadow-md border-2 ${gradeInfo.border.replace("/50", "").replace("/30", "")} z-10 flex items-center justify-center" style="left: calc(${100 - percent}% - 8px)">
                                <div class="w-1.5 h-1.5 rounded-full ${gradeInfo.bg}"></div>
                            </div>
                        </div>
                        <div class="flex justify-between text-xs font-mono text-zinc-500 dark:text-zinc-400 mt-2 px-1">
                            <span class="flex flex-col items-start font-medium">최악 <strong class="text-sm text-zinc-800 dark:text-zinc-200 mt-0.5">${min}</strong></span>
                            <span class="flex flex-col items-center font-medium">평균 <strong class="text-sm text-zinc-800 dark:text-zinc-200 mt-0.5">${Math.round(avg * 10) / 10}</strong></span>
                            <span class="flex flex-col items-end font-medium">최고 <strong class="text-sm text-zinc-800 dark:text-zinc-200 mt-0.5">${max}</strong></span>
                        </div>
                    </div>
                </div>
            `;

        resultArea.innerHTML = `
                ${createCard("체력(HP)", "heart", "hp", hpPercent, hpGrade, minHp, avgHp, maxHp, 0, currentHpGrowth)}
                ${createCard("마나(MP)", "droplets", "mp", mpPercent, mpGrade, minMp, avgMp, maxMp, 1, currentMpGrowth)}
                <p class="animate-fade-in-up text-xs text-center text-zinc-400 dark:text-zinc-500 mt-2 font-medium flex items-center justify-center gap-1.5" style="animation-delay: 0.3s">
                    <i data-lucide="info" class="w-4 h-4"></i> 결과 마커가 우측(100%)에 가까울수록 축캐를 의미합니다.
                </p>
            `;
        renderIcons();
      }

      window.onload = () => {
        try {
          initApp();
        } catch (err) {}
      };
    </script>
  </body>
</html>
